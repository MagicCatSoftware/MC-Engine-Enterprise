          <div style="display:flex;width:100%;align-items:center;gap:6px">
            <span class="tag tag-view" style="font-size:9px">TPL</span>
            <span class="list-item-name">${t.name}</span>
            <div class="list-item-actions">
              <button class="small" onclick="UI._editTemplate('${t.name}')">Edit</button>
              <button class="small" onclick="UI._copyTemplateHTML('${t.name}')">Copy HTML</button>
              <button class="small danger" onclick="TemplateSystem.delete('${t.name}')">&#x2715;</button>
            </div>
          </div>
          ${t.description ? `<div style="font-size:10px;color:var(--txt3);font-style:italic">${t.description}</div>` : ''}
          <div style="font-size:10px;color:var(--txt3)">${nc} node${nc !== 1 ? 's' : ''}</div>
        </div>`;
      }).join('')}
    </div>`;
  },
  _createTemplate() {
    const name = (document.getElementById('tpl-name')?.value || '').trim();
    const tag = document.getElementById('tpl-root-tag')?.value || 'div';
    const desc = (document.getElementById('tpl-desc')?.value || '').trim();
    if (!name) return Logger.error('Template name required');
    const tpl = TemplateSystem.create(name, { tag, description: desc });
    if (tpl) {
      document.getElementById('tpl-name').value = '';
      document.getElementById('tpl-desc').value = '';
      UI._editTemplate(name);
    }
  },
  _copyTemplateHTML(name) {
    const html = TemplateSystem.compile(name);
    if (navigator.clipboard) navigator.clipboard.writeText(html).then(() => Logger.ok(`Template "${name}" HTML copied to clipboard`));
    else Logger.info('Compiled HTML: ' + html);
  },
  _editTemplate(name) {
    window._tplModal = { name };
    window._tplModalExpanded = null;
    this._refreshTemplateModal();
  },
  _refreshTemplateModal() {
    const { name } = window._tplModal || {};
    const tpl = MCE.templates[name];
    if (!tpl) return;
    const TAGS = ['div','span','p','h1','h2','h3','h4','strong','em','a','img','input','button','ul','ol','li','section','article','header','footer','small','label','figure','blockquote'];
    const renderNode = (id, depth) => {
      const m = tpl.machines[id]; if (!m) return '';
      const isRoot = id === tpl.rootId;
      const isExp = window._tplModalExpanded === id;
      const pad = depth * 20;
      const tagOpts = TAGS.map(t => `<option${t === m.tag ? ' selected' : ''}>${t}</option>`).join('');
      const cssText = TemplateSystem.cssToText(m.css).replace(/</g,'&lt;').replace(/>/g,'&gt;');
      const attrsText = Object.entries(m.attrs || {}).filter(([,v]) => v !== undefined && v !== '').map(([k,v]) => `${k}="${v}"`).join('\n').replace(/</g,'&lt;');
      const textPreview = m.text ? (' — ' + m.text.slice(0, 28).replace(/</g,'&lt;') + (m.text.length > 28 ? '…' : '')) : '';
      return `
        <div style="margin:2px 0">
          <div style="display:flex;align-items:center;gap:4px;padding:3px 0 3px ${pad}px;min-height:26px">
            <span style="color:var(--txt3);font-size:9px;background:var(--bg0);padding:1px 5px;border-radius:2px;flex-shrink:0">&lt;${m.tag}&gt;</span>
            <span style="color:var(--txt3);font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0">${textPreview}</span>
            <div style="display:flex;gap:3px;flex-shrink:0">
              <button class="small" onclick="window._tplModalExpanded=(window._tplModalExpanded==='${id}'?null:'${id}');UI._refreshTemplateModal()" style="font-size:10px;padding:1px 7px">${isExp ? '▲' : '▼ edit'}</button>
              <button class="small" onclick="UI._tplAddNode('${name}','${id}')" style="font-size:10px;padding:1px 6px">+child</button>
              ${!isRoot ? `<button class="small danger" onclick="TemplateSystem.removeNode('${name}','${id}');UI._refreshTemplateModal()" style="font-size:10px;padding:1px 5px">&#x2715;</button>` : ''}
            </div>
          </div>
          ${isExp ? `
          <div style="margin-left:${pad + 16}px;padding:8px;background:var(--bg3);border-radius:4px;border:1px solid var(--brd);margin-bottom:6px">
            <div style="display:flex;gap:6px;margin-bottom:6px;flex-wrap:wrap">
              <div style="flex:0 0 auto"><label>Tag</label><select id="tn-tag-${id}" style="font-size:11px">${tagOpts}</select></div>
              <div style="flex:1;min-width:130px"><label>Text / token content</label><input id="tn-text-${id}" value="${(m.text || '').replace(/"/g,'&quot;').replace(/</g,'&lt;')}" placeholder="{{field}} or static text" style="width:100%"></div>
            </div>
            <div class="field"><label>CSS — one property per line, e.g. <code>display: flex</code> or <code>background: #111</code></label><textarea id="tn-css-${id}" rows="5" style="width:100%;font-family:monospace;font-size:10px;line-height:1.5">${cssText}</textarea></div>
            <div class="field"><label>Attrs — e.g. <code>src="{{url}}"</code> &nbsp; <code>type="text"</code> &nbsp; <code>href="{{link}}"</code></label><textarea id="tn-attrs-${id}" rows="2" style="width:100%;font-family:monospace;font-size:10px">${attrsText}</textarea></div>
            <button class="small primary" onclick="UI._saveTemplateNode('${name}','${id}')">Save Node</button>
            <button class="small" onclick="window._tplModalExpanded=null;UI._refreshTemplateModal()" style="margin-left:4px">Close</button>
          </div>` : ''}
          ${(m.children || []).map(cid => renderNode(cid, depth + 1)).join('')}
        </div>`;
    };
    const compiled = TemplateSystem.compile(name);
    const loopOpts = Object.values(MCE.loops || {}).map(l => `<option value="${l.name}">${l.name}</option>`).join('');
    this.openModal(`
      <h3 style="margin-bottom:10px;font-size:14px">Template: ${name}</h3>
      <div style="display:flex;gap:6px;margin-bottom:12px;align-items:flex-end">
        <div class="field" style="flex:1;margin:0"><label>Description</label><input id="tpl-edit-desc" value="${(tpl.description || '').replace(/"/g,'&quot;')}" style="width:100%"></div>
        <button class="small" onclick="MCE.templates['${name}'].description=document.getElementById('tpl-edit-desc').value;UndoSystem.push();Logger.ok('Description saved')">Save</button>
      </div>
      <div style="font-size:10px;color:var(--txt3);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Node Tree</div>
      <div style="border:1px solid var(--brd);border-radius:3px;padding:8px;background:var(--bg2);max-height:360px;overflow-y:auto;font-family:var(--font)">
        ${renderNode(tpl.rootId, 0)}
      </div>
      <div style="margin-top:12px">
        <div style="font-size:10px;color:var(--txt3);margin-bottom:4px;text-transform:uppercase;letter-spacing:1px">Compiled HTML</div>
        <pre style="font-family:monospace;font-size:10px;white-space:pre-wrap;word-break:break-all;color:var(--txt3);background:var(--bg2);border:1px solid var(--brd);border-radius:3px;padding:8px;max-height:90px;overflow-y:auto;margin:0">${compiled.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</pre>
        <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;align-items:center">
          <button class="small" onclick="UI._copyTemplateHTML('${name}')">Copy HTML</button>
          ${loopOpts ? `<select id="tpl-apply-loop-sel" style="flex:1;min-width:120px;font-size:11px"><option value="">— apply to loop —</option>${loopOpts}</select><button class="small primary" onclick="UI._applyTemplateToLoop('${name}',document.getElementById('tpl-apply-loop-sel').value)">Apply to Loop</button>` : ''}
        </div>
      </div>
      <div class="modal-actions" style="margin-top:12px">
        <button onclick="UI.closeModal();UI.renderTemplates()">Done</button>
      </div>`);
  },
  _saveTemplateNode(tplName, nodeId) {
    const tpl = MCE.templates[tplName];
    if (!tpl || !tpl.machines[nodeId]) return;
    const tag = document.getElementById(`tn-tag-${nodeId}`)?.value || 'div';
    const text = document.getElementById(`tn-text-${nodeId}`)?.value || '';
    const cssText = document.getElementById(`tn-css-${nodeId}`)?.value || '';
    const attrsText = document.getElementById(`tn-attrs-${nodeId}`)?.value || '';
    const css = TemplateSystem.parseCSSText(cssText);
    const attrs = {};
    (attrsText || '').split('\n').forEach(line => {
      line = line.trim(); if (!line) return;
      const m = line.match(/^([\w-]+)="([^"]*)"$/) || line.match(/^([\w-]+)=(.+)$/);
      if (m) attrs[m[1]] = m[2];
    });
    Object.assign(tpl.machines[nodeId], { tag, text, css, attrs });
    UndoSystem.push();
    Logger.ok(`Node ${nodeId} saved`);
    UI._refreshTemplateModal();
  },
  _tplAddNode(tplName, parentId) {
    const nodeId = TemplateSystem.addNode(tplName, parentId, { tag: 'div', text: '', css: {}, attrs: {} });
    if (nodeId) { window._tplModalExpanded = nodeId; UI._refreshTemplateModal(); }
  },
  _applyTemplateToLoop(tplName, loopName) {
    if (!loopName) return Logger.warn('Select a loop first');
    const loop = MCE.loops[loopName];
    if (!loop) return;
    loop.template = TemplateSystem.compile(tplName);
    UndoSystem.push();
    Logger.ok(`Template "${tplName}" applied to loop "${loopName}"`);
    UI.renderLoops();
  },
  _loadTemplateToLoop(prefix) {
    const selId = prefix === 'edit-loop' ? 'edit-loop-from-tpl' : 'loop-from-tpl';
    const tplId = prefix === 'edit-loop' ? 'edit-loop-template' : 'loop-template';
    const sel = document.getElementById(selId);
    const tplArea = document.getElementById(tplId);
    if (!sel || !tplArea || !sel.value) return Logger.warn('Select a template first');
    const html = TemplateSystem.compile(sel.value);
    if (!html) return Logger.error('Template compiled to empty HTML — add nodes in the Templates panel');
    tplArea.value = html;
    Logger.ok(`Template "${sel.value}" loaded into template field`);
  },

  // ---- VARS PANEL ----
  renderVars() {
    const el = document.getElementById('vars-panel-content');
    if (!el) return;
    const vars = MCE.vars;
    const entries = Object.entries(vars);
    el.innerHTML = `<div style="padding:12px">
      <p style="color:var(--txt3);font-size:11px;line-height:1.6;margin-bottom:10px">Global variables embedded in every export. Access in onclick code as <code style="color:var(--acc1)">MCE_VARS.name</code>. Read transformed output with <code style="color:var(--acc1)">MCE_OUT('M1')</code>.</p>
      <div style="display:flex;gap:6px;margin-bottom:12px">
        <input id="new-var-name" placeholder="variable name" style="flex:1;font-size:12px" onkeydown="if(event.key==='Enter')UI._addVar()">
        <input id="new-var-value" placeholder="initial value" style="flex:1;font-size:12px" onkeydown="if(event.key==='Enter')UI._addVar()">
        <button class="small primary" onclick="UI._addVar()">+</button>
      </div>
      ${!entries.length ? '<div style="color:var(--txt3);font-size:11px;padding:8px;border:1px solid var(--brd2);border-radius:3px">No variables. Add one above.</div>' : ''}
      ${entries.map(([name, v]) => `
        <div style="border:1px solid var(--brd);border-radius:3px;padding:8px;margin-bottom:8px;background:var(--bg2)">
          <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px">
            <code style="flex:1;font-size:11px;color:var(--acc1)">MCE_VARS.${name}</code>
            <button class="small danger" onclick="UI._deleteVar('${name}')">&#x2715;</button>
          </div>
          <input value="${(v.value||'').replace(/"/g,'&quot;')}" placeholder="value" style="width:100%;margin-bottom:4px;font-size:12px" oninput="MCE.vars['${name}'].value=this.value;UI._syncVarsGlobal()">
          <input value="${(v.desc||'').replace(/"/g,'&quot;')}" placeholder="description" style="width:100%;margin-bottom:4px;font-size:11px;color:var(--txt2)" oninput="MCE.vars['${name}'].desc=this.value">
          <label style="display:flex;align-items:center;gap:5px;font-size:11px;color:var(--txt3);cursor:pointer">
            <input type="checkbox" ${v.public?'checked':''} onchange="MCE.vars['${name}'].public=this.checked"> Public — sync to DB on save
          </label>
        </div>`).join('')}
    </div>`;
  },
  _setEmitOnInput(id, eventName) {
    const m = MCE.machines[id];
    if (!m) return;
    m.emitOnInput = eventName || '';
    UI.renderInspector();
    UI.renderCanvas();
  },
  _setEmitOnClick(id, eventName) {
    const m = MCE.machines[id];
    if (!m) return;
    m.emitOnClick = eventName || '';
    UI.renderInspector();
    UI.renderCanvas();
  },
  _syncVarsGlobal() {
    window.MCE_VARS = Object.fromEntries(
      Object.entries(MCE.vars || {}).map(([k, v]) => [k, (v && typeof v === 'object') ? String(v.value || '') : String(v || '')])
    );
  },
  _addVar() {
    const nameInp = document.getElementById('new-var-name');
    const valInp  = document.getElementById('new-var-value');
    const name = (nameInp.value || '').trim().replace(/[^a-zA-Z0-9_$]/g, '_');
    if (!name) return Logger.warn('Variable name required');
    if (MCE.vars[name]) return Logger.warn(`Variable "${name}" already exists`);
    UndoSystem.push();
    MCE.vars[name] = { value: valInp ? valInp.value : '', desc: '', public: false };
    nameInp.value = '';
    if (valInp) valInp.value = '';
    this.renderVars();
    this._syncVarsGlobal();
    Logger.ok(`Global variable "${name}" created`);
  },
  _deleteVar(name) {
    UndoSystem.push();
    delete MCE.vars[name];
    this.renderVars();
    this._syncVarsGlobal();
    Logger.warn(`Variable "${name}" deleted`);
  },

  // ---- CSS PANEL ----
  renderCSSPanel() {
    const el = document.getElementById('css-panel-content');
    if (!el) return;
    const m = MCE.selectedId ? MCE.machines[MCE.selectedId] : null;
    if (!m) { el.innerHTML = '<div class="empty-state">Select a machine to edit its CSS</div>'; return; }
    const css = m.css || {};
    const id = m.id;
    const props = Object.entries(css);

    const GROUPS = [
      { label: 'Layout', items: [
        { type:'enum', prop:'display',          vals:['flex','grid','block','inline','none'] },
        { type:'enum', prop:'position',         vals:['relative','absolute','fixed','sticky'] },
        { type:'enum', prop:'flex-direction',   vals:['row','column','row-reverse','column-reverse'] },
        { type:'enum', prop:'align-items',      vals:['flex-start','center','flex-end','stretch','baseline'] },
        { type:'enum', prop:'justify-content',  vals:['flex-start','center','flex-end','space-between','space-evenly'] },
        { type:'enum', prop:'overflow',         vals:['visible','hidden','auto','scroll'] },
        { type:'pill', prop:'gap',              def:'8px' },
        { type:'pill', prop:'flex-wrap',        def:'wrap' },
        { type:'pill', prop:'flex',             def:'1' },
        { type:'pill', prop:'z-index',          def:'1' },
      ]},
      { label: 'Sizing', items: [
        { type:'pill', prop:'width',            def:'100%' },
        { type:'pill', prop:'height',           def:'auto' },
        { type:'pill', prop:'min-width',        def:'0' },
        { type:'pill', prop:'max-width',        def:'100%' },
        { type:'pill', prop:'min-height',       def:'0' },
        { type:'pill', prop:'box-sizing',       def:'border-box' },
      ]},
      { label: 'Spacing', items: [
        { type:'pill', prop:'padding',          def:'16px' },
        { type:'pill', prop:'margin',           def:'0 auto' },
        { type:'pill', prop:'padding-top',      def:'16px' },
        { type:'pill', prop:'padding-bottom',   def:'16px' },
        { type:'pill', prop:'margin-top',       def:'16px' },
        { type:'pill', prop:'margin-bottom',    def:'16px' },
      ]},
      { label: 'Typography', items: [
        { type:'enum', prop:'text-align',       vals:['left','center','right','justify'] },
        { type:'enum', prop:'font-weight',      vals:['300','400','500','600','700','800'] },
        { type:'enum', prop:'text-transform',   vals:['none','uppercase','capitalize','lowercase'] },
        { type:'pill', prop:'font-size',        def:'16px' },
        { type:'pill', prop:'color',            def:'#ffffff' },
        { type:'pill', prop:'line-height',      def:'1.5' },
        { type:'pill', prop:'letter-spacing',   def:'0.5px' },
        { type:'pill', prop:'font-family',      def:'inherit' },
        { type:'pill', prop:'white-space',      def:'nowrap' },
      ]},
      { label: 'Background', items: [
        { type:'pill', prop:'background',              def:'rgba(255,255,255,0.05)' },
        { type:'pill', prop:'background-color',        def:'#1a1a2e' },
        { type:'pill', prop:'background-clip',         def:'text' },
        { type:'pill', prop:'-webkit-background-clip', def:'text', label:'-wk-bg-clip' },
        { type:'pill', prop:'-webkit-text-fill-color', def:'transparent', label:'-wk-fill-color' },
        { type:'pill', prop:'backdrop-filter',         def:'blur(12px)' },
        { type:'pill', prop:'opacity',                 def:'0.8' },
      ]},
      { label: 'Border', items: [
        { type:'pill', prop:'border',           def:'1px solid rgba(255,255,255,0.1)' },
        { type:'pill', prop:'border-radius',    def:'8px' },
        { type:'pill', prop:'border-top',       def:'1px solid rgba(255,255,255,0.1)' },
        { type:'pill', prop:'border-bottom',    def:'1px solid rgba(255,255,255,0.1)' },
        { type:'pill', prop:'border-left',      def:'2px solid var(--acc1)' },
        { type:'pill', prop:'outline',          def:'none' },
      ]},
      { label: 'Effects', items: [
        { type:'enum', prop:'cursor',           vals:['pointer','default','text','not-allowed','grab'] },
        { type:'pill', prop:'box-shadow',       def:'0 4px 20px rgba(0,0,0,0.3)' },
        { type:'pill', prop:'transition',       def:'all 0.2s ease' },
        { type:'pill', prop:'transform',        def:'scale(1)' },
        { type:'pill', prop:'filter',           def:'blur(0)' },
        { type:'pill', prop:'pointer-events',   def:'none' },
      ]},
    ];

    const rg = g => {
      const enums = g.items.filter(i => i.type==='enum').map(item => {
        const cur = css[item.prop];
        return `<div class="css-enum-row">
          <span class="css-enum-label">${item.prop}</span>
          <div style="display:flex;gap:3px;flex-wrap:wrap">
            ${item.vals.map(v => `<button class="css-val${cur===v?' active':''}" onclick="MachineSystem.setCSSProp('${id}','${item.prop}','${v}');UI.renderCSSPanel()">${v}</button>`).join('')}
            ${cur!==undefined?`<button class="css-val remove" title="Remove ${item.prop}" onclick="UI._removeCSSProp('${id}','${item.prop}')">✕</button>`:''}
          </div>
        </div>`;
      }).join('');
      const pills = g.items.filter(i => i.type==='pill').map(item => {
        const active = Object.prototype.hasOwnProperty.call(css, item.prop);
        const lbl = item.label || item.prop;
        const tip = active ? `${css[item.prop]} — click to remove` : `add: ${item.def}`;
        return `<button class="css-token${active?' css-token-active':''}" title="${tip}" onclick="UI._toggleCSSProp('${id}','${item.prop}','${(item.def||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'")}')"><span class="css-token-dot"></span>${lbl}</button>`;
      }).join('');
      return `<div class="css-group"><div class="css-group-label">${g.label}</div>${enums}${pills?`<div>${pills}</div>`:''}</div>`;
    };

    el.innerHTML = `
    <div class="panel-section">
      <h4>Active <span style="color:var(--txt3);font-size:10px;font-weight:normal;text-transform:none;letter-spacing:0">${props.length} prop${props.length!==1?'s':''} on &lt;${m.tag}&gt;</span></h4>
      <div id="css-props-list">
        ${props.length===0?'<div style="color:var(--txt3);font-size:11px;margin-bottom:6px">No properties set.</div>':''}
        ${props.map(([k,v],i)=>`
          <div class="css-prop-row">
            <input value="${k}" placeholder="property" oninput="UI._updateCSSKey('${id}',${i},this.value)" style="font-family:monospace;font-size:11px;width:110px;flex:none">
            <input value="${v.replace(/"/g,'&quot;').replace(/'/g,'&#39;')}" placeholder="value" oninput="UI._updateCSSVal('${id}','${k}',this.value)" style="font-family:monospace;font-size:11px;flex:1;min-width:0">
            <button class="small danger" onclick="UI._removeCSSProp('${id}','${k}')">&#x2715;</button>
          </div>`).join('')}
      </div>
      <button class="small" onclick="UI._addCSSProp('${id}')">+ Custom</button>
    </div>
    <div class="panel-section">
      <h4>Add / Remove</h4>
      ${GROUPS.map(rg).join('')}
    </div>
    <div class="panel-section">
      <h4>Raw CSS</h4>
      <textarea rows="4" readonly style="font-family:monospace;font-size:11px;width:100%;background:var(--bg1);border:1px solid var(--brd);color:var(--txt2);resize:vertical;padding:6px">${Object.entries(css).map(([k,v])=>`${k}: ${v};`).join('\n')}</textarea>
    </div>`;
  },
  _addCSSProp(id) {
    MachineSystem.setCSSProp(id, 'property', 'value');
    this.renderCSSPanel();
  },
  _removeCSSProp(id, key) {
    if (!MCE.machines[id]) return;
    delete MCE.machines[id].css[key];
    UI.applyLiveCSS(id);
    this.renderCSSPanel();
  },
  _toggleCSSProp(id, prop, def) {
    const m = MCE.machines[id];
    if (!m) return;
    if (!m.css) m.css = {};
    if (Object.prototype.hasOwnProperty.call(m.css, prop)) {
      delete m.css[prop];
      UI.applyLiveCSS(id);
    } else {
      MachineSystem.setCSSProp(id, prop, def);
    }
    this.renderCSSPanel();
  },
  _updateCSSKey(id, idx, newKey) {
    const m = MCE.machines[id];
    if (!m) return;
    const entries = Object.entries(m.css);
    if (!entries[idx]) return;
    const [oldKey, val] = entries[idx];
    if (oldKey === newKey) return;
    delete m.css[oldKey];
    m.css[newKey] = val;
    UI.applyLiveCSS(id);
    // Patch the sibling value input so its oninput targets the renamed key
    const rows = document.querySelectorAll('#css-props-list .css-prop-row');
    const row = rows[idx];
    if (row) {
      const inputs = row.querySelectorAll('input');
      if (inputs[1]) inputs[1].setAttribute('oninput', `UI._updateCSSVal('${id}','${newKey}',this.value)`);
      const btn = row.querySelector('button');
      if (btn) btn.setAttribute('onclick', `UI._removeCSSProp('${id}','${newKey}')`);
    }
  },
  _updateCSSVal(id, key, val) {
    MachineSystem.setCSSProp(id, key, val);
  },
  applyLiveCSS(id) {
    const m = MCE.machines[id];
    if (!m) return;
    // Apply to canvas DOM (position:fixed→absolute, strip animations, etc.)
    const canvasEl = document.querySelector(`#mw_${id} [data-machine-inner]`);
    if (canvasEl) {
      canvasEl.style.cssText = Object.entries(this._canvasCSS(m.css)).map(([k,v]) => `${k}:${v}`).join(';');
    }
    // Apply raw CSS directly into live iframe DOM (instant, no reload flash)
    if (MCE.canvasTab === 'live') {
      const frame = document.getElementById('live-canvas-frame');
      if (frame && frame.contentDocument) {

    ${this._renderBlockChain(mid, b.children || [], path, depth + 1)}
    <div style="display:flex;gap:3px;padding:3px 0">

  _logicGetBlock(id, pathStr) {
    const parts = String(pathStr).split('.').map(Number);
    let arr = (MCE.logic[id] || { blocks: [] }).blocks;
    let block = null;
    for (const idx of parts) { block = arr[idx]; if (!block) return null; arr = block.children || []; }
    return block;
  },
  _logicAddBlock(id, parentPath, type) {
    if (!MCE.logic[id]) MCE.logic[id] = { blocks: [] };
    const nb = type === 'loop'
      ? { type, collection: '', query: '', itemVar: 'item', code: '', actions: [], children: [] }
      : { type, condition: '', code: '', actions: [], children: [] };
    if (parentPath === '') {
      MCE.logic[id].blocks.push(nb);
    } else {
      const parent = this._logicGetBlock(id, parentPath);
      if (!parent) return;
      if (!parent.children) parent.children = [];
      parent.children.push(nb);
    }
    this.renderLogicPanel();
  },
  _logicRemoveBlock(id, pathStr) {
    const parts = String(pathStr).split('.').map(Number);
    const lastIdx = parts.pop();
    let arr = MCE.logic[id].blocks;
    for (const idx of parts) arr = arr[idx].children;
    arr.splice(lastIdx, 1);
    this.renderLogicPanel();
  },
  _logicAddSibling(id, pathStr, type) {
    if (!MCE.logic[id]) return;
    const parts = String(pathStr).split('.').map(Number);
    const insertAfter = parts[parts.length - 1];
    const parentParts = parts.slice(0, -1);
    let arr;
    if (parentParts.length === 0) {
      arr = MCE.logic[id].blocks;
    } else {
      const parent = this._logicGetBlock(id, parentParts.join('.'));
      if (!parent) return;
      if (!parent.children) parent.children = [];
      arr = parent.children;
    }
    const nb = type === 'loop'
      ? { type, collection: '', query: '', itemVar: 'item', code: '', actions: [], children: [] }
      : { type, condition: '', code: '', actions: [], children: [] };
    arr.splice(insertAfter + 1, 0, nb);
    this.renderLogicPanel();
  },
  _logicSetField(id, pathStr, field, value) {
    const block = this._logicGetBlock(id, pathStr);
    if (block) block[field] = value;
  },
  _logicAddAction(id, pathStr) {
    const block = this._logicGetBlock(id, pathStr);
    if (!block) return;
    if (!block.actions) block.actions = [];
    block.actions.push({ targetId: '', action: 'show', actionArgs: '' });
    this.renderLogicPanel();
  },
  _logicRemoveAction(id, pathStr, aIdx) {
    const block = this._logicGetBlock(id, pathStr);
    if (!block || !block.actions) return;
    block.actions.splice(aIdx, 1);
    this.renderLogicPanel();
  },
  _logicSetAction(id, pathStr, aIdx, field, value) {
    const block = this._logicGetBlock(id, pathStr);
    if (block && block.actions && block.actions[aIdx]) block.actions[aIdx][field] = value;
  },
  _logicGetAction(id, pathStr, aIdx, field) {
    const block = this._logicGetBlock(id, pathStr);
    return block && block.actions && block.actions[aIdx] ? block.actions[aIdx][field] : '';
  },
  renderLogic(id) { this.renderLogicPanel(); },
  _runLogicWithCtx(id) {
    const raw = document.getElementById('logic-ctx').value || '{}';
    try { MachineSystem.executeLogic(id, JSON.parse(raw)); }
    catch(e) { Logger.error('Context JSON error: ' + e.message); }
  },

      chip('PipeSystem.fetch', "PipeSystem.fetch('pipeName', {}, {});", 'GET a live pipe'),

        <div style="margin-top:6px"><span style="color:var(--acc1)">loops</span> <span style="color:var(--txt3)">=</span> <span style="color:var(--ok)">{${Object.keys(MCE.loops||{}).join(', ')||'…'}}</span></div>
        <div><span style="color:var(--acc1)">DB</span> <span style="color:var(--txt3)">→</span> <span style="color:var(--ok)">find · findOne · insert · update · remove · clear</span> <span style="color:var(--txt3)">(${Object.keys(DB._store||{}).filter(k=>!k.startsWith('_')).join(', ')||'…'})</span></div>

      : '<span style="color:var(--txt3);font-size:10px">no pipes defined yet</span>';

    const collNames = [...new Set([...(LiveDBPanel._collections || []), ...Object.keys(DB._store || {}).filter(k => !k.startsWith('_'))])];
    const collChips = collNames.length
      ? collNames.map(name => chip(name, `DB.find('${name}', {});`, `Read collection "${name}"`)).join('')
      : '<span style="color:var(--txt3);font-size:10px">no collections yet</span>';

    el.innerHTML = `
    <div class="panel-section">
      <h4>Code Port: ${ea(m.name)}</h4>

        <em>any</em> wire, anywhere, by setting that wire's action to <code style="color:var(--acc1)">Run Code</code> —

      </p>
      <textarea id="code-editor-${id}" rows="10" style="font-family:monospace;font-size:11px;width:100%;resize:vertical;background:var(--bg2);color:var(--txt1);border:1px solid var(--brd2);border-radius:3px;padding:8px"
        placeholder="// e.g.&#10;el.style.transform = 'scale(1.05)';&#10;EventBus.emit('myEvent', { value: 1 });"
        oninput="UI._setMachineCode('${id}', this.value)">${ea(m.code)}</textarea>
      <div style="display:flex;gap:6px;margin-top:6px">
        <button class="small primary" onclick="UI._runCodeWithCtx('${id}')">&#x25B6; Run Now</button>
        <button class="small danger" style="margin-left:auto" onclick="UI._setMachineCode('${id}','');UI.renderCodePanel()">Clear</button>
      </div>
    </div>
    <div class="panel-section">
      <h4>ctx JSON <span style="font-size:9px;font-weight:normal;color:var(--txt3)">(for Run Now)</span></h4>
      <textarea id="code-ctx" rows="2" placeholder='{"value":5}'></textarea>

      ${systemVarsBox}

    <div class="panel-section">
      <h4>Engine API</h4>
      <p style="color:var(--txt3);font-size:10px;margin-bottom:4px">Click any chip to insert it at the cursor.</p>
      <div>${apiChips}</div>

      <h4>This Project's Events</h4>
      <div>${eventChips}</div>

      <div style="margin-bottom:6px">${varChips}</div>

  _setMachineCode(id, value) {
    const m = MCE.machines[id];
    if (!m) return;
    m.code = value;
  },
  _codeInsert(id, snippet) {
    const ta = document.getElementById('code-editor-' + id);
    if (!ta) return;
    this._insertAtCursor(ta, snippet);
    this._setMachineCode(id, ta.value);
  },
  _runCodeWithCtx(id) {
    const raw = document.getElementById('code-ctx')?.value || '{}';
    try { MachineSystem.executeCode(id, JSON.parse(raw)); }
    catch(e) { Logger.error('Context JSON error: ' + e.message); }
  },

  // ---- CANVAS ----
  renderCanvas() {
    const drop = document.getElementById('canvas-drop');
    if (!drop) return;
    const rootMachines = MCE.rootOrder.filter(id => MCE.machines[id] && !MCE.machines[id].parentId);
    if (rootMachines.length === 0) {
      MCE._canvasViewport = false;
      drop.removeAttribute('style');
      drop.innerHTML = '<div class="empty-state" style="padding:40px">No machines yet.<br>Add a machine from the toolbar above.</div>';
      return;
    }
    // Detect viewport-scale projects (any root machine uses position:fixed)
    const isViewport = rootMachines.some(id => MCE.machines[id]?.css?.position === 'fixed');
    MCE._canvasViewport = isViewport;
    drop.classList.toggle('vp-mode', isViewport);
    if (isViewport) {
      // Simulate viewport: canvas-drop becomes a 1280:800 aspect-ratio box
      drop.style.cssText = 'position:relative;overflow:hidden;min-height:0;aspect-ratio:1280/800;width:100%;border:2px dashed var(--brd);border-radius:4px';
    } else {
      drop.removeAttribute('style');
    }
    drop.innerHTML = rootMachines.map(id => this._renderMachineEl(id)).join('');
    // Re-apply click handlers
    drop.querySelectorAll('.m-wrapper').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        MachineSystem.select(el.dataset.id);
      });
    });
    // Re-apply sanitized CSS
    Object.keys(MCE.machines).forEach(id => this.applyLiveCSS(id));
    // Also refresh live canvas if it's active
    if (MCE.canvasTab === 'live') this.renderLiveCanvas();
  },
  _canvasCSS(css) {
    const _c2k = s => s.replace(/([A-Z])/g, c => '-' + c.toLowerCase());
    const STRIP = new Set(['will-change','transition','animation','animation-name','animation-duration']);
    const vp = MCE._canvasViewport;
    const out = {};
    for (const [rawK, v] of Object.entries(css || {})) {
      const k = _c2k(rawK);
      if (STRIP.has(k)) continue;
      if (k === 'position' && (v === 'fixed' || v === 'sticky')) {
        if (vp && v === 'fixed') out[k] = 'absolute';
        continue;
      }
      if ((k === 'height' || k === 'min-height') && String(v).includes('vh')) {
        if (vp) out[k] = '100%';
        continue;
      }
      if ((k === 'height' || k === 'min-height') && v === '100%') {
        if (!vp) continue;
      }
      if (k === 'width' && String(v).endsWith('%') && parseFloat(v) > 100) {
        if (!vp) continue;
      }
      if ((k === 'overflow' || k === 'overflow-x' || k === 'overflow-y') && v === 'hidden') {
        if (!vp) { out[k] = 'visible'; continue; }
      }
      out[k] = v;
    }
    return out;
  },
  _renderMachineEl(id) {
    const m = MCE.machines[id];
    if (!m) return '';
    const selfClosing = ['input','img','br','hr'].includes(m.tag);
    const cssStr = Object.entries(this._canvasCSS(m.css)).map(([k,v]) => `${k}:${v}`).join(';');
    const children = m.children.map(cid => this._renderMachineEl(cid)).join('');
    const codeBadge = (m.code && m.code.trim())
      ? ` <span title="Has a code port — see the Code tab" style="color:var(--acc1)">&#9889;</span>` : '';
    let _mtext = m.text || '';
    if (_mtext.indexOf('{{') !== -1) {
      Object.entries(MCE.vars || {}).forEach(([k, v]) => {
        const val = (v && typeof v === 'object') ? String(v.value || '') : String(v || '');
        _mtext = _mtext.split('{{' + k + '}}').join(val);
      });
    }
    // Table with pipe loop: render thead + empty tbody placeholder
    if (m.tag === 'table' && m.tableLoop && (m.tableLoop.columns||[]).length) {
      const tl = m.tableLoop;
      const thHtml = tl.columns.map(c => `<th style="text-align:left;padding:4px 8px;border-bottom:1px solid var(--brd);color:var(--acc1);font-size:11px">${c.label||c.field||'?'}</th>`).join('');
      const innerContent = `<table data-machine-inner style="${cssStr};width:100%;border-collapse:collapse">
        <thead><tr>${thHtml}</tr></thead>
        <tbody><tr><td colspan="${tl.columns.length}" style="color:var(--txt3);font-size:11px;padding:8px;text-align:center;font-style:italic">${tl.pipeName ? `bound to "${tl.pipeName}" — rows render in live preview` : 'no pipe selected'}</td></tr></tbody>
      </table>`;
      return `<div class="m-wrapper" id="mw_${id}" data-id="${id}">
        <div class="m-label">${m.name} &lt;table&gt;${codeBadge}</div>
        ${innerContent}
      </div>`;
    }
    // Media elements: resolve src and render with preview
    if (['img','video','audio'].includes(m.tag) && m.attrs && m.attrs.src) {
      let _src = m.attrs.src;
      if (_src.indexOf('{{') !== -1) {
        Object.entries(MCE.vars || {}).forEach(([k, v]) => {
          const val = (v && typeof v === 'object') ? String(v.value || '') : String(v || '');
          _src = _src.split('{{' + k + '}}').join(val);
        });
      }
      let _innerContent;
      if (m.tag === 'img') {
        _innerContent = `<img data-machine-inner src="${_src}" style="${cssStr};max-width:100%;display:block">`;
      } else if (m.tag === 'video') {
        _innerContent = `<video data-machine-inner src="${_src}" controls style="${cssStr};max-width:100%"></video>`;
      } else {
        _innerContent = `<audio data-machine-inner src="${_src}" controls style="${cssStr}"></audio>`;
      }
      return `<div class="m-wrapper" id="mw_${id}" data-id="${id}">
        <div class="m-label">${m.name} &lt;${m.tag}&gt;${codeBadge}</div>
        ${_innerContent}
      </div>`;
    }
    const innerContent = selfClosing
      ? `<${m.tag} data-machine-inner style="${cssStr}">`
      : `<${m.tag} data-machine-inner style="${cssStr}">${_mtext}${children}</${m.tag}>`;
    return `<div class="m-wrapper" id="mw_${id}" data-id="${id}">
      <div class="m-label">${m.name} &lt;${m.tag}&gt;${codeBadge}</div>
      ${innerContent}
    </div>`;
  },

  // ---- DOM TREE ----
  renderDOMTree() {
    const el = document.getElementById('dom-tree-inner');
    if (!el) return;
    const roots = MCE.rootOrder.filter(id => MCE.machines[id] && !MCE.machines[id].parentId);
    if (roots.length === 0) { el.innerHTML = '<div class="empty-state">No machines</div>'; return; }
    el.innerHTML = roots.map(id => this._renderDOMNode(id, 0)).join('');
  },
  _renderDOMNode(id, depth) {
    const m = MCE.machines[id];
    if (!m) return '';
    const selected = MCE.selectedId === id ? ' selected' : '';
    const indent = '&nbsp;'.repeat(depth * 4);
    const children = m.children.length ? m.children.map(cid => `<div class="dom-children">${this._renderDOMNode(cid, depth + 1)}</div>`).join('') : '';
    const hasChildren = m.children.length > 0;
    return `<div id="dn_${id}" class="dom-node${selected}" onclick="MachineSystem.select('${id}')">
      ${indent}<span class="dom-tag">&lt;${m.tag}&gt;</span>
      <span class="dom-name">${m.name}</span>
      ${hasChildren ? `<span class="badge" style="margin-left:4px">${m.children.length}</span>` : ''}
      ${m.wires.length ? `<span class="badge" style="color:var(--acc1)">${m.wires.length} wires</span>` : ''}
      ${(m.code && m.code.trim()) ? `<span class="badge" title="Has a code port" style="color:var(--acc1)">&#9889; code</span>` : ''}
    </div>${children}`;
  },

  // ---- INSPECTOR ----
  renderInspector() {
    const el = document.getElementById('inspector-content');
    if (!el) return;
    const id = MCE.selectedId;
    if (!id || !MCE.machines[id]) {
      el.innerHTML = '<div class="empty-state" style="margin-top:20px">Select a machine to inspect</div>'; return;
    }
    const m = MCE.machines[id];
    if (MCE.inspectorTab === 'props') this._renderPropsTab(el, m);
    else if (MCE.inspectorTab === 'wire') this._renderWireTab(el, m);
    else if (MCE.inspectorTab === 'data') this._renderDataTab(el, m);
  },
  _renderPropsTab(el, m) {
    el.innerHTML = `
    <div class="inspector-section">
      <h4>Identity</h4>
      <div class="field"><label>Machine Name</label>
        <input value="${m.name}" onchange="MachineSystem.update('${m.id}','name',this.value);UI.renderDOMTree();UI.renderInspector()">
      </div>
      <div class="field"><label>Tag</label>
        <select onchange="MachineSystem.update('${m.id}','tag',this.value);UI.renderCanvas();UI.renderInspector()">
          ${['div','section','article','header','footer','nav','button','input','textarea','select','p','h1','h2','h3','span','a','img','video','audio','ul','li','table','form','label'].map(t => `<option ${m.tag===t?'selected':''}>${t}</option>`).join('')}
        </select>
      </div>
    </div>
    ${['img','video','audio'].includes(m.tag) ? (() => {
      const _mtype = m.tag === 'img' ? 'image' : m.tag;
      const _msrc = (m.attrs && m.attrs.src) || '';
      const _mvar = _msrc.match(/^\{\{([^}]+)\}\}$/);
      const _varOpts = Object.keys(MCE.vars||{}).map(k => `<option value="{{${k}}}" ${_msrc===`{{${k}}}`?'selected':''}>${k}</option>`).join('');
      return `
    <div class="inspector-section">
      <h4>Media Source <span style="color:var(--txt3);font-weight:normal;font-size:10px">${m.tag}</span></h4>
      ${_msrc ? `<div style="font-size:10px;color:var(--txt2);word-break:break-all;margin-bottom:6px;padding:4px 6px;background:var(--bg3);border-radius:3px">${_msrc}</div>` : '<div style="font-size:10px;color:var(--txt3);margin-bottom:6px">No source set</div>'}
      <div style="display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px">
        <button class="small primary" onclick="UI._openMediaPicker('${m.id}','${_mtype}')">Browse / Upload</button>
        ${_msrc ? `<button class="small danger" onclick="MachineSystem.setAttr('${m.id}','src','');UI.renderCanvas();UI.renderInspector()">Clear</button>` : ''}
      </div>
      <div class="field"><label style="font-size:10px;color:var(--txt3)">or from var</label>
        <select onchange="MachineSystem.setAttr('${m.id}','src',this.value);UI.renderCanvas();UI.renderInspector()">
          <option value="">— pick a var —</option>
          ${_varOpts}
        </select>
      </div>
    </div>`;
    })() : ''}
    <div class="inspector-section">
      <h4>Text Content</h4>
      <div class="field">
        <textarea rows="3" oninput="MachineSystem.update('${m.id}','text',this.value);UI.renderCanvas()">${m.text||''}</textarea>
      </div>
    </div>
    <div class="inspector-section">
      <h4>Attributes <button class="small" onclick="UI._addAttr('${m.id}')">+ Add</button></h4>
      ${Object.entries(m.attrs).map(([k,v]) => `
        <div class="css-prop-row">
          <input value="${k}" placeholder="attr" onchange="UI._renameAttr('${m.id}','${k}',this.value)">
          <input value="${v}" placeholder="value" oninput="MachineSystem.setAttr('${m.id}','${k}',this.value)">
          <button class="small danger" onclick="MachineSystem.setAttr('${m.id}','${k}','');UI.renderInspector()">&#x2715;</button>
        </div>`).join('')}
      ${!Object.keys(m.attrs).length ? '<div style="color:var(--txt3);font-size:11px">No attributes</div>' : ''}
    </div>
    <div class="inspector-section">
      <h4>Quick Actions</h4>
      <div style="display:flex;flex-wrap:wrap;gap:4px">
        <button class="small" onclick="MachineSystem.executeAction('${m.id}','show')">Show</button>
        <button class="small" onclick="MachineSystem.executeAction('${m.id}','hide')">Hide</button>
        <button class="small" onclick="MachineSystem.executeAction('${m.id}','toggle')">Toggle</button>
        <button class="small" onclick="MachineSystem.executeAction('${m.id}','fadeIn')">Fade In</button>
        <button class="small" onclick="MachineSystem.executeAction('${m.id}','fadeOut')">Fade Out</button>
        <button class="small" onclick="MachineSystem.executeAction('${m.id}','fadeToBlack')">Fade to Black</button>
        <button class="small primary" onclick="MachineSystem.executeLogic('${m.id}',{})">Run Logic</button>
      </div>
    </div>
    ${m.tag === 'table' ? `
    <div class="inspector-section">
      <h4>Table Data <span style="color:var(--txt3);font-weight:normal;font-size:10px">pipe loop</span></h4>
      <div class="field"><label>Source Pipe (GET)</label>
        <select onchange="UI._tableSetPipe('${m.id}',this.value)">
          <option value="">— none —</option>
          ${Object.values(MCE.pipes).filter(p => p.method === 'GET').map(p => `<option value="${p.name}" ${(m.tableLoop&&m.tableLoop.pipeName===p.name)?'selected':''}>${p.name}</option>`).join('')}
        </select>
      </div>
      <div style="color:var(--txt3);font-size:10px;margin-bottom:6px">Columns — define headers and which field to show in each cell</div>
      ${(m.tableLoop&&m.tableLoop.columns||[]).map((col,i) => `
        <div class="css-prop-row">
          <input value="${col.label||''}" placeholder="Header" oninput="UI._tableUpdateCol('${m.id}',${i},'label',this.value)" style="flex:1">
          <input value="${col.field||''}" placeholder="field" oninput="UI._tableUpdateCol('${m.id}',${i},'field',this.value)" style="flex:1">
          <button class="small danger" onclick="UI._tableRemoveCol('${m.id}',${i})">&#x2715;</button>
        </div>`).join('')}
      <button class="small" style="margin-top:4px" onclick="UI._tableAddCol('${m.id}')">+ Column</button>
    </div>` : ''}
`;
  },
  _addAttr(id) {
    MachineSystem.setAttr(id, 'class', '');
    UI.renderInspector();
  },
  _renameAttr(id, oldKey, newKey) {
    const m = MCE.machines[id];
    if (!m) return;
    const val = m.attrs[oldKey];
    delete m.attrs[oldKey];
    m.attrs[newKey] = val;
    UI.renderInspector();
    UI.renderCanvas();
  },
  _tableSetPipe(id, pipeName) {
    const m = MCE.machines[id]; if (!m) return;
    const tl = Object.assign({ columns: [] }, m.tableLoop || {}, { pipeName });
    MachineSystem.update(id, 'tableLoop', tl);
    UI.renderInspector();
  },
  _tableAddCol(id) {
    const m = MCE.machines[id]; if (!m) return;
    const tl = m.tableLoop || { pipeName: '', columns: [] };
    MachineSystem.update(id, 'tableLoop', Object.assign({}, tl, { columns: [...(tl.columns||[]), { label: '', field: '' }] }));
    UI.renderInspector();
  },
  _tableRemoveCol(id, idx) {
    const m = MCE.machines[id]; if (!m) return;
    const tl = m.tableLoop || { pipeName: '', columns: [] };
    MachineSystem.update(id, 'tableLoop', Object.assign({}, tl, { columns: (tl.columns||[]).filter((_,i) => i !== idx) }));
    UI.renderInspector();
  },
  _tableUpdateCol(id, idx, field, value) {
    const m = MCE.machines[id]; if (!m) return;
    UndoSystem.pushDebounced(600);
    const tl = m.tableLoop || { pipeName: '', columns: [] };
    const cols = (tl.columns||[]).map((c,i) => i === idx ? Object.assign({}, c, { [field]: value }) : c);
    MCE.machines[id].tableLoop = Object.assign({}, tl, { columns: cols });
    UI.renderCanvas();
  },
  _openMediaPicker(machineId, mediaType) {
    const _acceptMap = { image: 'image/*', video: 'video/*', audio: 'audio/*' };
    const accept = _acceptMap[mediaType] || '*/*';
    // Open modal immediately — don't wait for fetch
    this.openModal(`
      <h3>Media Picker <span style="color:var(--txt3);font-weight:normal;font-size:11px">${mediaType}</span></h3>
      <div id="mce-media-grid" style="display:flex;flex-wrap:wrap;gap:8px;min-height:60px;max-height:260px;overflow-y:auto;margin-bottom:12px">
        <div style="color:var(--txt3);font-size:11px;align-self:center">Loading…</div>
      </div>
      <div style="border-top:1px solid var(--brd);padding-top:10px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <input type="file" accept="${accept}" multiple id="mce-media-file-input" style="position:absolute;width:1px;height:1px;opacity:0;pointer-events:none" onchange="UI._mediaUpload('${machineId}','${mediaType}',this)">
        <button class="small primary" onclick="var _i=document.getElementById('mce-media-file-input');if(_i)_i.click()">+ Upload ${mediaType}</button>
        <span id="mce-media-status" style="font-size:11px;color:var(--txt3)"></span>
      </div>
      <div class="modal-actions"><button onclick="UI.closeModal()">Cancel</button></div>
    `);
    // Populate grid asynchronously
    fetch('/api/files', { credentials: 'include' })
      .then(r => r.ok ? r.json() : [])
      .then(data => {
        const files = Array.isArray(data) ? data : [];
        const filtered = files.filter(f => f.type === mediaType);
        const grid = document.getElementById('mce-media-grid');
        if (!grid) return;
        if (!filtered.length) { grid.innerHTML = `<div style="color:var(--txt3);font-size:11px">No ${mediaType} files yet — upload one below.</div>`; return; }
        grid.innerHTML = filtered.map(f => {
          const thumb = f.type === 'image'
            ? `<img src="${f.url}" style="width:80px;height:60px;object-fit:cover;border-radius:3px;display:block;margin:0 auto 4px">`
            : f.type === 'video'
            ? `<div style="width:80px;height:60px;background:var(--bg3);border-radius:3px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;font-size:24px">&#9654;</div>`
            : `<div style="width:80px;height:60px;background:var(--bg3);border-radius:3px;display:flex;align-items:center;justify-content:center;margin:0 auto 4px;font-size:24px">&#9835;</div>`;

  _mediaUpload(machineId, mediaType, input) {
    const picked = input.files;
    if (!picked || !picked.length) return;
    const status = document.getElementById('mce-media-status');
    if (status) status.textContent = 'Uploading…';
    const fd = new FormData();
    Array.from(picked).forEach(f => fd.append('files', f));
    fetch('/api/files/upload', { method: 'POST', credentials: 'include', body: fd })
      .then(r => r.json())
      .then(resp => {
        const uploaded = resp.uploaded || [];
        if (uploaded.length === 1) {
          this._mediaPickSet(machineId, uploaded[0].url);
        } else if (uploaded.length > 1) {
          this._openMediaPicker(machineId, mediaType);
        } else {
          if (status) status.textContent = resp.error || 'Upload failed — check file type.';
        }
      })
      .catch(e => { if (status) status.textContent = 'Upload error: ' + e.message; });
  },

    UI.renderInspector();

      <div style="display:flex;gap:6px;align-items:center">

      <p style="color:var(--txt3);font-size:11px;margin-bottom:8px">Every machine has its own document in the <code>_machines</code> collection. Push writes current state. Pull applies the stored doc back to the machine.</p>

  // ---- MACHINE ADD ----
  addMachine() {
    const tag = document.getElementById('add-tag-select').value;
    // In viewport mode, root machines end up hidden behind position:absolute containers.
    // Auto-parent to the selected machine so new elements land inside the layout.
    const parentId = MCE._canvasViewport ? (MCE.selectedId || null) : null;
    MachineSystem.create(tag, parentId);
    if (parentId) UI.renderCanvas();
  },
  addChildMachine() {
    if (!MCE.selectedId) return Logger.warn('Select a machine first');
    const tag = document.getElementById('add-tag-select').value;
    MachineSystem.create(tag, MCE.selectedId);
    UI.renderCanvas();
  },
  deleteMachine() {
    if (!MCE.selectedId) return Logger.warn('No machine selected');
    if (confirm(`Delete machine "${MCE.machines[MCE.selectedId]?.name}"?`)) {
      MachineSystem.delete(MCE.selectedId);
    }
  },
  clearMachines() {
    const count = Object.keys(MCE.machines).length;
    if (!count) return Logger.warn('No machines to clear');
    if (!confirm(`Are you sure you want to delete all ${count} machine${count !== 1 ? 's' : ''}? This cannot be undone.`)) return;
    UndoSystem.push();
    MCE.machines = {};
    MCE.rootOrder = [];
    MCE.logic = {};
    MCE.selectedId = null;
    MCE._canvasViewport = false;
    this.renderCanvas();
    this.renderDOMTree();
    this.renderInspector();
    this.renderCSSPanel();
    this.renderLogicPanel();
    this.renderCodePanel();
    Logger.warn('All machines cleared');
  },

  // ---- PREVIEW / RUN ----
  runPreview() {
    const roots = MCE.rootOrder.filter(id => MCE.machines[id] && !MCE.machines[id].parentId);
    const bodyHTML = roots.map(id => MachineSystem.buildHTML(id, true)).join('\n');
    const css = this.buildExportCSS();
    const frame = document.getElementById('preview-frame');
    const script = this.buildExportScript();
    const _dynBindings = {};
    Object.entries(MCE.machines).forEach(([_mid, _mm]) => {
      if (_mm.pipeBindings && _mm.pipeBindings.length) _dynBindings[_mid] = _mm.pipeBindings;
    });
    const _boundPipes = new Set();
    Object.values(MCE.machines).forEach(m => {
      (m.pipeBindings || []).forEach(pb => { if (pb.pipeName) _boundPipes.add(pb.pipeName); });
    });
    Object.values(MCE.loops || {}).forEach(loop => { if (loop.pipeName) _boundPipes.add(loop.pipeName); });
    const _resizeFrame = () => {
      try {
        const doc = frame.contentDocument;
        const h = Math.max(doc.documentElement.scrollHeight, doc.body.scrollHeight);
        const minH = (frame.parentElement && frame.parentElement.clientHeight) || 0;
        frame.style.height = Math.max(h, minH) + 'px';
      } catch(e) {}
    };
    frame.style.height = '100%';
    // Remove any previous resize listener before attaching a new one
    if (frame._mceResizeHandler) window.removeEventListener('message', frame._mceResizeHandler);
    frame._mceResizeHandler = function(e) {
      if (e.source === frame.contentWindow && e.data && e.data.type === 'mce:resize') {
        setTimeout(_resizeFrame, 150);
      }
    };
    window.addEventListener('message', frame._mceResizeHandler);
    frame.onload = function() {
      _resizeFrame();
      _boundPipes.forEach(pipeName => {
        const pipe = MCE.pipes[pipeName];
        if (!pipe || pipe.method !== 'GET') return;
        PipeSystem.fetch(pipeName).then(resp => {
          if (frame.contentWindow) {
            try { frame.contentWindow.postMessage({ type: 'mce:pipeData', pipeName, data: resp.data, bindings: _dynBindings }, '*'); } catch(e) {}
            setTimeout(_resizeFrame, 300);
          }
        });
      });
    };
    frame.srcdoc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><style>${css}html{margin:0;overflow-x:hidden}body{margin:0;overflow-x:hidden}</style></head><body>${bodyHTML}<script>${script}<\/script></body></html>`;
    Logger.ok('Preview rendered');
  },
  buildExportCSS() {
    const style = this.runtimeStyles[MCE.runtimeStyle || 'mono'] || this.runtimeStyles.mono;
    const cssVars = ':root{' + Object.entries(style).map(([k,v]) => `--${k}:${v}`).join(';') + ';--font:\'JetBrains Mono\',monospace}';
    const projectCSS = typeof MCE.css === 'string' ? MCE.css : '';
    return cssVars + `*{box-sizing:border-box}body{margin:0;font-family:var(--font,sans-serif)}.nav-active{color:#fff!important;border-color:#a855f7!important;background:rgba(168,85,247,0.15)!important}.tab-active{background:#fff!important;color:#000!important;font-weight:bold!important}` + projectCSS;
  },
  buildExportScript() {
    const wireData = {};
    Object.entries(MCE.machines).forEach(([id, m]) => {
      if (m.wires && m.wires.length > 0) wireData[id] = m.wires;
    });
    const varWireData = {};
    Object.entries(MCE.machines).forEach(([id, m]) => {
      if (m.varWires && m.varWires.length > 0) varWireData[id] = m.varWires;
    });
    const bindingsData = {};
    Object.entries(MCE.machines).forEach(([id, m]) => {
      if (m.pipeBindings && m.pipeBindings.length > 0) bindingsData[id] = m.pipeBindings;
    });
    const codePortData = {};
    Object.entries(MCE.machines).forEach(([id, m]) => {
      if (m.code && m.code.trim()) codePortData[id] = m.code;
    });
    const transformData = {};
    Object.entries(MCE.machines).forEach(([id, m]) => {
      const inF  = (m.inputTransform  && m.inputTransform.filter)  ? m.inputTransform  : null;
      const outF = (m.outputTransform && m.outputTransform.filter)  ? m.outputTransform : null;
      if (inF || outF) transformData[id] = { in: inF || null, out: outF || null };
    });
    const varStore = {};
    Object.entries(MCE.vars || {}).forEach(([k, v]) => { varStore[k] = (v && typeof v === 'object') ? String(v.value || '') : String(v || ''); });
    const loopData = MCE.loops;
    const defaultView = Object.keys(MCE.views)[0] || null;
    const dbSourceData = {};
    Object.entries(MCE.machines).forEach(([id, m]) => { if (m.dbSource && m.dbSource.collection) dbSourceData[id] = m.dbSource; });
    const tableLoopsData = {};
    Object.entries(MCE.machines).forEach(([id, m]) => {
      if (m.tag === 'table' && m.tableLoop && m.tableLoop.pipeName && (m.tableLoop.columns||[]).length) {
        tableLoopsData[id] = { pipeName: m.tableLoop.pipeName, columns: m.tableLoop.columns };
      }
    });
    const initNavEvents = {};
    const _rootId = MCE.rootOrder[0];
    if (_rootId && MCE.machines[_rootId]) {
      (MCE.machines[_rootId].wires || []).forEach(w => { if (w.action === 'navigate' && w.actionArgs && w.eventName) initNavEvents[w.actionArgs.trim()] = w.eventName; });
    }

      try { LoopSystem.renderAll(ev.data.pipeName, ev.data.data); } catch(x) {}
      try { applyBindings(ev.data.pipeName, ev.data.data, ev.data.bindings); } catch(x) {}
      try { _renderTableLoop(ev.data.pipeName, ev.data.data); } catch(x) {}
    }
  });
})();`;
  },
  exportHTML() {
    const roots = MCE.rootOrder.filter(id => MCE.machines[id] && !MCE.machines[id].parentId);
    const bodyHTML = roots.map(id => MachineSystem.buildHTML(id, true)).join('\n');
    const css = this.buildExportCSS();
    const script = this.buildExportScript();
    const projectName = MCE.project.name || 'project';
    const html = `<!DOCTYPE html>\n<html lang="en">\n<head>\n<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>${projectName}</title>\n<style>${css}</style>\n</head>\n<body>\n${bodyHTML}\n<script>${script}<\/script>\n</body>\n</html>`;
    const blob = new Blob([html], { type: 'text/html' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = projectName.replace(/\s+/g, '_') + '.html';
    a.click();
    URL.revokeObjectURL(url);
    Logger.ok('HTML exported: ' + a.download);
  },

  // ---- EXPORT / IMPORT ----
  exportJSON() {
    // Serialize current DB state (excluding internal _machines collection) as seed data
    const dbCollections = Object.keys(DB._store)
      .filter(name => name !== '_machines')
      .map(name => {
        const coll = DB._store[name];
        const stripMeta = d => { const { _id, _created, _updated, ...rest } = d; return rest; };
        const seed = coll.isArray
          ? coll.docs.map(stripMeta)
          : (coll.single && coll.single._id ? [stripMeta(coll.single)] : []);
        return { name, isArray: coll.isArray, seed };
      });
    const data = {
      version: MCE.version,
      project: MCE.project,
      machines: MCE.machines,
      rootOrder: MCE.rootOrder,
      events: MCE.events,
      pipes: MCE.pipes,
      views: MCE.views,
      loops: MCE.loops,
      vars: MCE.vars,
      logic: MCE.logic,
      css: typeof MCE.css === 'string' ? MCE.css : '',
      runtimeStyle: MCE.runtimeStyle,
      templates: MCE.templates || {},
      dbCollections,
      _nextId: MCE._nextId,
    };
    const json = JSON.stringify(data, null, 2);
    const blob = new Blob([json], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = (MCE.project.name || 'project').replace(/\s+/g, '_') + '.mce.json';
    a.click();
    URL.revokeObjectURL(url);
    Logger.ok('Project exported as JSON');
  },
  importJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,.mce.json';
    input.onchange = e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        try {
          const data = JSON.parse(ev.target.result);
          this._loadJSON(data);
        } catch(err) { Logger.error('Import failed: ' + err.message); }
      };
      reader.readAsText(file);
    };
    input.click();
  },
  _loadJSON(data) {
    MCE.project = data.project || { name: 'Imported' };
    MCE.machines = data.machines || {};
    MCE.rootOrder = data.rootOrder || [];
    MCE.events = data.events || {};
    MCE.pipes = data.pipes || {};
    MCE.views = data.views || {};
    MCE.logic = data.logic || {};
    MCE.loops = data.loops || {};
    MCE.templates = data.templates || {};
    MCE.css = typeof data.css === 'string' ? data.css : '';
    MCE.runtimeStyle = data.runtimeStyle || 'clean';
    const _rawVars = data.vars || {};
    MCE.vars = Object.fromEntries(Object.entries(_rawVars).map(([k, v]) => {
      const obj = (v && typeof v === 'object') ? v : { value: String(v || ''), desc: '' };
      if (obj.public === undefined) obj.public = false;
      return [k, obj];
    }));
    MCE._nextId = data._nextId || 1;
    // Backfill children:[] on any logic blocks that predate the recursive system
    const _backfillBlocks = blocks => { if (!blocks) return; blocks.forEach(b => { if (!b.children) b.children = []; if (!b.actions) b.actions = []; if (b.type === 'loop') { if (b.collection === undefined) b.collection = ''; if (b.query === undefined) b.query = ''; if (!b.itemVar) b.itemVar = 'item'; } _backfillBlocks(b.children); }); };
    Object.values(MCE.logic || {}).forEach(l => { if (l && l.blocks) _backfillBlocks(l.blocks); });
    // Auto-create DB collections declared in the project (with optional seed data)
    MCE.dbCollections = data.dbCollections || [];
    if (Array.isArray(data.dbCollections)) {
      data.dbCollections.forEach(c => {
        if (!DB._store[c.name]) {
          DB.createCollection(c.name, c.isArray !== false);
          if (Array.isArray(c.seed)) c.seed.forEach(doc => DB.insert(c.name, doc));
        }
      });
    }
    // Migrate old pipe format (direction → method + endpoint) and re-register mock routes
    Object.values(MCE.pipes).forEach(p => {
      if (!p.method) p.method = p.direction === 'out' ? 'GET' : 'POST';
      if (!p.endpoint) p.endpoint = `/api/${p.collection || p.name}`;
      if (p.delay === undefined) p.delay = 300;
      MockAPI.registerPipeEndpoints(p);
    });
    // Ensure _machines collection exists, then backfill docs for all imported machines
    if (!DB._store['_machines']) DB.createCollection('_machines', true);
    Object.values(MCE.machines).forEach(m => {
      if (m.dbSource === undefined) m.dbSource = null;
      if (m.emitOnInput === undefined) m.emitOnInput = '';
      if (m.emitOnClick === undefined) m.emitOnClick = '';
      if (!m.transferOnClick) m.transferOnClick = { fromId: '', eventName: '' };
      if (!m.inputTransform)  m.inputTransform  = { filter: '', arg: '' };
      if (!m.outputTransform) m.outputTransform = { filter: '', arg: '' };
      if (!m.varWires) m.varWires = [];
      if (m.code === undefined) m.code = '';
      if (!m.attrs) m.attrs = {};
      if (!m.css) m.css = {};
      if (!m.children) m.children = [];
      if (m.wires) m.wires.forEach(w => { if (w.targetId === undefined) w.targetId = ''; });
      if (!m.pipeBindings) m.pipeBindings = [];
      m.pipeBindings.forEach(pb => {
        if (pb.target && !pb.action) { pb.action = pb.target === 'innerHTML' ? 'setHTML' : pb.target === 'textContent' ? 'setText' : pb.target; }
        if (pb.actionArgs === undefined) pb.actionArgs = '';
        if (pb.field === undefined) pb.field = pb.actionArgs ? '_template' : '';
      });
      if (!DB.findOne('_machines', { _machineId: m.id })) {
        DB.insert('_machines', { _machineId: m.id, name: m.name, tag: m.tag, text: m.text || '', css: { ...(m.css || {}) }, attrs: { ...(m.attrs || {}) } });
      }
    });
    MCE.selectedId = null;
    ViewSystem._active = null;
    ViewSystem._params = {};
    document.getElementById('project-name-input').value = MCE.project.name || 'Imported';
    document.title = MCE.project.name + ' - Magic Cat Engine';
    this.renderDB();
    this.renderEvents();
    this.renderPipes();
    this.renderViews();
    this.renderLoops();
    this.renderTemplates();
    this.renderVars();
    this._syncVarsGlobal();
    this.renderCanvas();
    this.renderDOMTree();
    this.renderInspector();
    this.renderLogicPanel();
    this.renderCodePanel();
    this.renderCSSPanel();
    this.applyRuntimeStyle(MCE.runtimeStyle);
    // Auto-switch to Live tab if project has machines with complex viewport CSS
    if (Object.keys(MCE.machines).length > 0) {
      const hasViewportCSS = Object.values(MCE.machines).some(m => m.css && (m.css.height === '100vh' || m.css.height === '100%' || m.css.position === 'fixed'));
      if (hasViewportCSS) this.switchCanvasTab('live');
    }
    Logger.ok('Project imported: ' + MCE.project.name);
  },

  // ---- REPLICATE SELF ----
  resetAll() {
    UndoSystem.push();
    // Wipe all project state — machines, vars, events, pipes, views, loops, logic
    // DB._store is intentionally left intact
    MCE.machines  = {};
    MCE.rootOrder = [];
    MCE.events    = {};
    MCE.pipes     = {};
    MCE.views     = {};
    MCE.loops     = {};
    MCE.templates = {};
    MCE.vars      = {};
    MCE.logic     = {};
    MCE.css       = '';
    MCE._nextId   = 1;
    MCE.selectedId = null;
    ViewSystem._active = null;
    ViewSystem._params = {};
    // Re-render all panels from the now-empty state
    this.renderCanvas();
    this.renderDOMTree();
    this.renderInspector();
    this.renderLogicPanel();
    this.renderCodePanel();
    this.renderCSSPanel();
    this.renderEvents();
    this.renderPipes();
    this.renderViews();
    this.renderLoops();
    this.renderTemplates();
    this.renderVars();
    // Blank then rebuild the live frame
    const _lf = document.getElementById('live-canvas-frame');
    if (_lf) { _lf.srcdoc = ''; this.renderLiveCanvas(); }
    const _pf = document.getElementById('preview-frame');
    if (_pf) _pf.srcdoc = '';
    Logger.ok('App reset — machines, vars and wires cleared. Database preserved.');
  },

  replicateSelf() {
    const data = {
      version: MCE.version,
      project: MCE.project,
      machines: MCE.machines,
      rootOrder: MCE.rootOrder,
      events: MCE.events,
      pipes: MCE.pipes,
      views: MCE.views,
      logic: MCE.logic,
      runtimeStyle: MCE.runtimeStyle,
      _nextId: MCE._nextId,
      _selfReplicated: true,
      _replicatedAt: new Date().toISOString(),
      _fingerprint: Math.random().toString(36).substr(2),
    };
    this.openModal(`<h3>&#x2728; Machine Constant — Self Replication</h3>
      <p style="color:var(--txt2);font-size:12px;margin-bottom:12px">
        This JSON represents the complete individuality of this engine instance.<br>
        It can be transmitted and reconstructed in any compatible host.<br>
        <strong>Fingerprint:</strong> <code style="color:var(--acc1)">${data._fingerprint}</code>
      </p>
      <textarea rows="15" style="font-family:monospace;font-size:11px;width:100%" readonly>${JSON.stringify(data, null, 2)}</textarea>
      <div class="modal-actions">
        <button onclick="UI.closeModal()">Close</button>
        <button class="primary" onclick="navigator.clipboard.writeText(JSON.stringify(${JSON.stringify(data)})).then(()=>Logger.ok('Copied to clipboard!'))">Copy</button>
        <button class="primary" onclick="UI.exportJSON()">Download</button>
      </div>`);
    Logger.ok(`Self-replication transmitted. Fingerprint: ${data._fingerprint}`);
  },

  // ---- MODAL ----
  openModal(html) {
    document.getElementById('modal-content').innerHTML = html;
    document.getElementById('modal-overlay').classList.add('open');
  },
  closeModal(e) {
    if (e && e.target !== document.getElementById('modal-overlay')) return;
    document.getElementById('modal-overlay').classList.remove('open');
  },
};

// ============================================================
// KEYBOARD SHORTCUTS
// ============================================================
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault();
    const order = MachineSystem.flatOrder();
    if (!order.length) return;
    const cur = order.indexOf(MCE.selectedId);
    const next = e.key === 'ArrowDown'
      ? order[cur === -1 ? 0 : Math.min(cur + 1, order.length - 1)]
      : order[cur === -1 ? 0 : Math.max(cur - 1, 0)];
    MachineSystem.select(next);
    const dn = document.getElementById('dn_' + next);
    if (dn) dn.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    const mw = document.getElementById('mw_' + next);
    if (mw) mw.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
    return;
  }
  if (e.key === 'Delete' && MCE.selectedId) {
    if (confirm(`Delete "${MCE.machines[MCE.selectedId]?.name}"?`)) MachineSystem.delete(MCE.selectedId);
  }
  if (e.key === 'Escape') UI.closeModal({target: document.getElementById('modal-overlay')});
  if (e.key === 'd' && e.ctrlKey) { e.preventDefault(); UI.switchCanvasTab('dom'); }
  if (e.key === 'p' && e.ctrlKey) { e.preventDefault(); UI.runPreview(); }
  if (e.key === 'e' && e.ctrlKey) { e.preventDefault(); UI.exportJSON(); }
  if (e.key === 'z' && (e.ctrlKey || e.metaKey) && !e.shiftKey) { e.preventDefault(); UndoSystem.undo(); }
  if ((e.key === 'y' && e.ctrlKey) || (e.key === 'z' && (e.ctrlKey || e.metaKey) && e.shiftKey)) { e.preventDefault(); UndoSystem.redo(); }
  if (e.key === 's' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); window.MCE_CLOUD ? MCE_CLOUD.save() : UI.exportJSON(); }
});

// ============================================================
// GLOBAL CONSOLE ACCESS
// ============================================================
window.MCE = MCE;
window.DB = DB;
window.EventBus = EventBus;
window.MockAPI = MockAPI;
window.PipeSystem = PipeSystem;
window.ViewSystem = ViewSystem;
window.MachineSystem = MachineSystem;
window.Logger = Logger;
window.UI = UI;
window.FilesPanel = FilesPanel;

// ============================================================
// BUILT-IN DEMO / STARTER
// ============================================================
function loadStarterProject() {
  if (window.MCE_PROFILE && window.MCE_PROFILE.isOwner && window.MCE_PROFILE.data) return;
  DB.createCollection('messages', true);
  DB.createCollection('settings', false);

  MCE.events['appReady'] = { name: 'appReady', payload: '{}' };
  MCE.events['buttonClicked'] = { name: 'buttonClicked', payload: '{id, label}' };
  MCE.events['dataLoaded'] = { name: 'dataLoaded', payload: '{records}' };

  PipeSystem.create('writeMessage', { method: 'POST', endpoint: '/api/messages', collection: 'messages', delay: 300, schema: [{ key: 'text', type: 'text' }, { key: 'author', type: 'text' }] });
  PipeSystem.create('readMessages', { method: 'GET', endpoint: '/api/messages', collection: 'messages', delay: 300, schema: [] });

  ViewSystem.create('home',  { description: 'Home page' });
  ViewSystem.create('about', { description: 'About page' });

  const container = MachineSystem.create('div', null, 'app_container');
  MCE.machines[container.id].css = { display: 'flex', 'flex-direction': 'column', padding: '20px', gap: '16px', 'min-height': '100%', background: '#1a1a2e' };

  const header = MachineSystem.create('header', container.id, 'app_header');
  MCE.machines[header.id].text = '&#x1F408; Magic Cat Engine';
  MCE.machines[header.id].css = { color: '#a855f7', 'font-size': '24px', 'font-weight': 'bold', padding: '10px 0' };

  const btn = MachineSystem.create('button', container.id, 'main_button');
  MCE.machines[btn.id].text = 'Click Me';
  MCE.machines[btn.id].css = { background: '#7c3aed', color: '#fff', border: 'none', padding: '10px 20px', 'border-radius': '4px', cursor: 'pointer', 'font-size': '16px', width: '200px' };
  MCE.machines[btn.id].wires = [{ eventName: 'click', action: 'emit', actionArgs: 'buttonClicked' }];

  const output = MachineSystem.create('div', container.id, 'output_box');
  MCE.machines[output.id].text = 'Events will appear here...';
  MCE.machines[output.id].css = { background: '#0e0e1a', color: '#9090b0', padding: '12px', 'border-radius': '4px', 'min-height': '60px', 'font-size': '13px', 'font-family': 'monospace', border: '1px solid #2a2a45' };
  MCE.machines[output.id].wires = [{ eventName: 'buttonClicked', action: 'setText', actionArgs: 'Button was clicked! Event: buttonClicked' }];

  MCE.logic[btn.id] = {
    blocks: [
      { type: 'if', condition: 'ctx.count > 5', code: "EventBus.emit('dataLoaded', {records: DB.find('messages')});" },
      { type: 'else', condition: '', code: "Logger.info('Count is <= 5');" }
    ]
  };

  UI.renderCanvas();
  UI.renderDOMTree();
  UI.renderEvents();
  UI.renderPipes();
  UI.renderViews();
  UI.renderLoops();
  UI.renderTemplates();
  UI.renderDB();
  UI.renderInspector();
  Logger.ok('Starter project loaded — explore the panels!');
  Logger.info('Tip: Select a machine, then use the right panel to wire events and logic.');
  Logger.info('Tip: Ctrl+P = Preview | Ctrl+D = DOM Tree | Ctrl+E = Export');
}

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  UI.init();
  loadStarterProject();
  EventBus.emit('appReady', { version: MCE.version });
});
</script>
