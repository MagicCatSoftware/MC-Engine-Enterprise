      case 'loopRender': if (args) { const loop = MCE.loops[args]; if (loop && loop.pipeName) PipeSystem.fetch(loop.pipeName, payload); else if (loop) LoopSystem.render(args, []); } break;
      case 'renderPreview': this._renderPreviewAction(args); break;
      case 'appendValue': this._appendValueAction(args); break;
      case 'exportHTMLFromFields': this._downloadTextAction(args, false); break;
      case 'exportJSONFromFields': this._downloadTextAction(args, true); break;
      case 'syncJSONFromFields': this._syncJSONAction(args); break;
      case 'importJSONToFields': this._importJSONAction(args); break;
      case 'clearFields': this._clearFieldsAction(args); break;
    }
    Logger.info(`Action "${action}" on ${MCE.machines[id]?.name}`);
  },
  dbPush(id) {
    const m = MCE.machines[id];
    if (!m) return;
    if (!DB._store['_machines']) return Logger.warn('_machines collection not found');
    const existing = DB.findOne('_machines', { _machineId: id });
    const doc = { name: m.name, tag: m.tag, text: m.text, css: { ...m.css }, attrs: { ...m.attrs } };
    if (existing) {
      DB.update('_machines', { _machineId: id }, doc);
    } else {
      DB.insert('_machines', { _machineId: id, ...doc });
    }
    Logger.ok(`Machine "${m.name}" pushed to DB`);
    UI.renderInspector();
  },
  dbPull(id) {
    const m = MCE.machines[id];
    if (!m) return;
    if (m.dbSource && m.dbSource.collection) {
      const src = DB.getCollection(m.dbSource.collection);
      if (src) {
        const docs = src.isArray ? src.docs : (src.single ? [src.single] : []);
        const doc = docs[0] || null;
        if (doc && m.dbSource.field && doc[m.dbSource.field] !== undefined) {
          m.text = String(doc[m.dbSource.field]);
          UI.renderCanvas();
          UI.renderInspector();
          Logger.ok(`Machine "${m.name}" pulled "${m.dbSource.field}" from "${m.dbSource.collection}"`);
          return;
        }
      }
      Logger.warn(`dbPull: no matching doc/field in "${m.dbSource.collection}"`);
      return;
    }
    if (!DB._store['_machines']) return Logger.warn('_machines collection not found');
    const doc = DB.findOne('_machines', { _machineId: id });
    if (!doc) return Logger.warn(`No DB doc for machine "${m.name}" — push first`);
    if (doc.text !== undefined && doc.text !== '') m.text = doc.text;
    if (doc.css && typeof doc.css === 'object') Object.assign(m.css, doc.css);
    if (doc.attrs && typeof doc.attrs === 'object') Object.assign(m.attrs, doc.attrs);
    UI.renderCanvas();
    UI.renderInspector();
    Logger.ok(`Machine "${m.name}" pulled from _machines`);
  },
  setDbSource(id, key, value) {
    const m = MCE.machines[id];
    if (!m) return;
    if (!m.dbSource) m.dbSource = { collection: '', field: '' };
    m.dbSource[key] = value;
    if (!m.dbSource.collection && !m.dbSource.field) m.dbSource = null;
    UI.renderInspector();
  },
  executeLogic(id, context = {}) {
    const logic = MCE.logic[id];
    if (!logic || !logic.blocks.length) return;
    this._executeBlockChain(logic.blocks, context, id);
  },
  _executeBlockChain(blocks, context, id) {
    const _view = ViewSystem._active;
    const _params = { ...ViewSystem._params };
    const _vars = Object.fromEntries(Object.entries(MCE.vars || {}).map(([k, v]) => [k, (v && typeof v === 'object') ? String(v.value || '') : String(v || '')]));
    const _loops = MCE.loops || {};
    const _runBlock = (block, ctx) => {
      if (block.actions && block.actions.length) {
        block.actions.forEach(a => { if (a.action) MachineSystem.executeAction(a.targetId || id, a.action, ctx, a.actionArgs || ''); });
      }
      if (block.code) {
        try { eval(`(function(ctx, DB, EventBus, PipeSystem, ViewSystem, LoopSystem, machine, view, params, vars, loops){ ${block.code} })(ctx, DB, EventBus, PipeSystem, ViewSystem, LoopSystem, MCE.machines['${id}'], _view, _params, _vars, _loops)`); }
        catch(e) { Logger.error(`Logic code: ${e.message}`); }
      }
      if (block.children && block.children.length) this._executeBlockChain(block.children, ctx, id);
    };
    let chainPassed = false;
    for (const block of blocks) {
      if (block.type === 'loop') {
        chainPassed = false;
        let items = [];
        if (block.collection) {
          try { items = DB.find(block.collection, block.query ? JSON.parse(block.query) : {}); }
          catch(e) { Logger.error(`Loop: ${e.message}`); }
        }
        const iv = block.itemVar || 'item';
        items.forEach((item, idx) => _runBlock(block, { ...context, [iv]: item, _index: idx, _total: items.length }));
        continue;
      }
      if (block.type === 'if') chainPassed = false;
      let pass = false;
      if ((block.type === 'if' || block.type === 'elseif') && !chainPassed) {
        try { pass = !!eval(`(function(ctx, DB, EventBus, PipeSystem, ViewSystem, LoopSystem, view, params, vars, loops){ return ${block.condition}; })(context, DB, EventBus, PipeSystem, ViewSystem, LoopSystem, _view, _params, _vars, _loops)`); }
        catch(e) { Logger.error(`Logic condition: ${e.message}`); }
      } else if (block.type === 'else' && !chainPassed) { pass = true; }
      if (pass) { chainPassed = true; _runBlock(block, context); }
    }
  },
  // ---- CODE PORT (free-form per-machine JS — editor quick-test) ----
  executeCode(id, context = {}) {
    const m = MCE.machines[id];
    if (!m || !m.code || !m.code.trim()) return;
    const _view = ViewSystem._active;
    const _params = { ...ViewSystem._params };
    const _vars = Object.fromEntries(Object.entries(MCE.vars || {}).map(([k, v]) => [k, (v && typeof v === 'object') ? String(v.value || '') : String(v || '')]));
    const _logicSys = { run: (lid, ctx) => MachineSystem.executeLogic(lid, ctx) };
    const el = document.getElementById('mw_' + id);
    const inner = el ? el.querySelector('[data-machine-inner]') : null;
    const target = inner || el;
    const _emit = (name, payload) => EventBus.emit(name, payload);
    try {
      (new Function('ctx','id','el','EventBus','PipeSystem','DB','ViewSystem','LogicSystem','FilterSystem','MCE_VARS','vars','emit','view','params',
        m.code
      ))(context, id, target, EventBus, PipeSystem, DB, ViewSystem, _logicSys, FilterSystem, _vars, _vars, _emit, _view, _params);
    } catch(e) { Logger.error(`Code port (${m.name}): ${e.message}`); }
  },
  buildHTML(id, forExport = false) {
    const m = MCE.machines[id];
    if (!m) return '';
    const emitAttr = m.emitOnInput ? ` oninput="EventBus.emit('${m.emitOnInput}',{value:this.value})"` : '';
    const _emitHasVal = ['input','textarea','select'].includes(m.tag);
    const emitClickAttr = m.emitOnClick ? ` onclick="EventBus.emit('${m.emitOnClick}',${_emitHasVal ? '{value:this.value}' : '{}'})"` : '';
    const toc = m.transferOnClick;
    const transferAttr = (toc && toc.fromId && toc.eventName)
      ? ` onclick="(function(){var s=document.querySelector('[data-mce-id=${toc.fromId}]');if(!s){var w=document.getElementById('mw_${toc.fromId}');s=w?w.querySelector('[data-machine-inner]'):null;}var v=s?(s.tagName==='INPUT'||s.tagName==='TEXTAREA'?s.value:s.textContent)||'':'';EventBus.emit('${toc.eventName}',{value:v});})();"` : '';
    const _attrsObj = m.attrs || {};
    // Auto-add controls for video/audio when they have a src, unless already set
    const _autoControls = (forExport && ['video','audio'].includes(m.tag) && _attrsObj.src && !('controls' in _attrsObj)) ? ' controls' : '';
    const attrs = emitClickAttr + Object.entries(_attrsObj).map(([k,v]) => ` ${k}="${String(v).replace(/"/g,'&quot;')}"`).join('') + _autoControls + emitAttr + transferAttr;
    // View-bound machines start hidden in export; ViewSystem reveals the correct ones on load
    const _c2k = s => s.replace(/([A-Z])/g, c => '-' + c.toLowerCase());
    const baseCss = Object.entries(m.css || {}).map(([k,v]) => `${_c2k(k)}:${v}`).join(';');
    const cssStr = (forExport && m.viewBinding) ? ('display:none;' + baseCss.replace(/display:[^;]+;?/g,'')) : baseCss;
    const styleAttr = cssStr ? ` style="${cssStr}"` : '';
    const exportAttr = forExport ? ` data-mce-id="${id}"` : '';
    const viewAttr  = (forExport && m.viewBinding) ? ` data-view="${m.viewBinding}"` : '';
    const selfClosing = ['input','img','br','hr'].includes(m.tag);
    const childrenHTML = m.children.map(cid => this.buildHTML(cid, forExport)).join('');
    if (selfClosing) return `<${m.tag}${exportAttr}${viewAttr}${attrs}${styleAttr}>`;
    // Table with pipe loop: export proper thead + empty tbody (loop fills it at runtime)
    if (forExport && m.tag === 'table' && m.tableLoop && (m.tableLoop.columns||[]).length) {
      const thHtml = m.tableLoop.columns.map(c => `<th>${c.label||c.field||''}</th>`).join('');
      return `<table${exportAttr}${viewAttr}${attrs}${styleAttr}><thead><tr>${thHtml}</tr></thead><tbody></tbody></table>`;
    }
    const rawText = m.text || '';
    let displayText = rawText;
    if (forExport && rawText.indexOf('{{') !== -1) {
      Object.entries(MCE.vars || {}).forEach(([k, v]) => {
        const val = (v && typeof v === 'object') ? String(v.value || '') : String(v || '');
        displayText = displayText.split('{{' + k + '}}').join(val);
      });
    }
    return `<${m.tag}${exportAttr}${viewAttr}${attrs}${styleAttr}>${displayText}${childrenHTML}</${m.tag}>`;
  },
};

// ============================================================
// LOGGER
// ============================================================
const Logger = {
  _entries: [],
  _collapsed: false,
  _counts: { info: 0, warn: 0, error: 0, ok: 0 },
  _log(level, msg, data) {
    const entry = { level, msg: typeof msg === 'string' ? msg : JSON.stringify(msg), data, time: new Date().toLocaleTimeString() };
    this._entries.unshift(entry);
    if (this._entries.length > 200) this._entries.pop();
    this._counts[level] = (this._counts[level] || 0) + 1;
    this._render(entry);
    this._updateStats();
  },
  info(msg, data) { this._log('info', msg, data); },
  warn(msg, data) { this._log('warn', msg, data); },
  error(msg, data) { this._log('error', msg, data); },
  ok(msg, data) { this._log('ok', msg, data); },
  _render(entry) {
    const out = document.getElementById('log-output');
    if (!out) return;
    const row = document.createElement('div');
    row.className = 'log-entry';
    row.innerHTML = `<span class="log-time">${entry.time}</span><span class="log-level ${entry.level}">${entry.level.toUpperCase()}</span><span class="log-msg">${entry.msg}</span>`;
    out.prepend(row);
  },
  _updateStats() {
    const el = document.getElementById('log-stats');
    if (el) el.textContent = `${this._counts.ok || 0} ok | ${this._counts.warn || 0} warn | ${this._counts.error || 0} err`;
  },
  clear() { this._entries = []; this._counts = { info: 0, warn: 0, error: 0, ok: 0 }; const out = document.getElementById('log-output'); if (out) out.innerHTML = ''; this._updateStats(); },
  toggle() {
    this._collapsed = !this._collapsed;
    const lp = document.getElementById('log-panel');
    if (lp) lp.style.height = this._collapsed ? '32px' : '180px';
  },
};

      txt1:'#f0fdf4', txt2:'#d9f99d', txt3:'#86a487', brd:'#4ade80', brd2:'#365c41', info:'#86efac'
    },
    ember: {
      bg0:'#120807', bg1:'#1f0f0b', bg2:'#2c1710', bg3:'#3a2015', bg4:'#4a2a1b',
      acc1:'#fed7aa', acc2:'#fb923c', acc3:'#facc15', acc4:'#cbd5e1',
      txt1:'#fff7ed', txt2:'#fed7aa', txt3:'#b98b6a', brd:'#fb923c', brd2:'#7c2d12', info:'#fb923c'
    },
    clean: {
      bg0:'#ffffff', bg1:'#fafafa', bg2:'#f5f5f5', bg3:'#efefef', bg4:'#e8e8e8',

  },
  applyRuntimeStyle(name = 'mono') {
    const style = this.runtimeStyles[name] || this.runtimeStyles.mono;
    const root = document.documentElement;
    Object.entries(style).forEach(([key, value]) => root.style.setProperty('--' + key, value));
    MCE.runtimeStyle = name;
    const sel = document.getElementById('runtime-style-select');
    if (sel) sel.value = name;
    Logger.ok('Runtime style applied: ' + (sel?.selectedOptions?.[0]?.textContent || name));
  },
  init() {
    Logger.ok('Magic Cat Engine v' + MCE.version + ' initialized');
    Logger.info('Select a tab on the left to begin. Add machines via the canvas toolbar.');
    LiveDBPanel.loadCollections();
    this.renderDB();
    this.renderEvents();
    this.renderPipes();
    this.renderViews();
    this.renderLoops();
    this.renderTemplates();
    this.renderVars();
    this._syncVarsGlobal();
    this.renderInspector();
    this.renderCanvas();
    this.renderDOMTree();
    this.renderLogicPanel();
    this.renderCodePanel();
    this.renderCSSPanel();

    document.getElementById('project-name-input').addEventListener('change', e => {
      MCE.project.name = e.target.value;
      document.title = e.target.value + ' - Magic Cat Engine';
    });
    this.applyRuntimeStyle(MCE.runtimeStyle || 'clean');

    // URL param routing (editor: simulate popstate for canvas preview)
    window.addEventListener('popstate', () => {
      const sp = new URLSearchParams(location.search);
      const view = sp.get('view');
      if (view && MCE.views[view]) {
        const params = Object.fromEntries([...sp.entries()].filter(([k]) => k !== 'view'));
        ViewSystem.navigate(view, params);
      }
    });

    // Re-scale live frame on window resize
    window.addEventListener('resize', () => {
      if (MCE.canvasTab === 'live') requestAnimationFrame(() => this._applyLiveFrameZoom());
    });
  },

  switchLeftTab(tab) {
    MCE.leftTab = tab;
    document.querySelectorAll('#left-panel .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    document.querySelectorAll('#left-panel .tab-panel').forEach(p => p.classList.toggle('active', p.id === 'tab-' + tab));
    if (tab === 'css') this.renderCSSPanel();
    if (tab === 'logic') this.renderLogicPanel();
    if (tab === 'code') this.renderCodePanel();
    if (tab === 'db') {
      if (LiveDBPanel._collections === null && !LiveDBPanel._loading) LiveDBPanel.loadCollections();
      else this.renderDB();
    }
    if (tab === 'files') FilesPanel.load();
  },

  switchInspectorTab(tab) {
    MCE.inspectorTab = tab;
    document.querySelectorAll('#right-panel .tab-btn').forEach(b => b.classList.toggle('active', b.dataset.itab === tab));
    this.renderInspector();
  },

  setCanvasZoom(v) {
    const z = parseFloat(v);
    MCE._canvasZoom = z;
    const drop = document.getElementById('canvas-drop');
    if (drop) drop.style.zoom = z;
    const lbl = document.getElementById('canvas-zoom-label');
    if (lbl) lbl.textContent = Math.round(z * 100) + '%';
    const rng = document.getElementById('canvas-zoom-range');
    if (rng) rng.value = z;
    if (MCE.canvasTab === 'live') this._applyLiveFrameZoom();
  },
  _applyLiveFrameZoom() {
    const frame = document.getElementById('live-canvas-frame');
    const wrap  = document.getElementById('live-view');
    const views = document.getElementById('canvas-views');
    if (!frame || !wrap || !views) return;
    const designW = 1280;
    const designH = 800;
    // Read dimensions from stable parent, not live-view (whose height we mutate)
    const wrapW = views.clientWidth || designW;
    const wrapH = views.clientHeight || designH;
    const z = (MCE._canvasZoom || 1) * Math.min(wrapW / designW, wrapH / designH);
    const scaledW = Math.round(designW * z);
    const scaledH = Math.round(designH * z);
    const offsetX = Math.max(0, Math.floor((wrapW - scaledW) / 2));
    const offsetY = Math.max(0, Math.floor((wrapH - scaledH) / 2));
    frame.style.width  = designW + 'px';
    frame.style.height = designH + 'px';
    frame.style.transform = `translate(${offsetX}px, ${offsetY}px) scale(${z})`;
    frame.style.transformOrigin = 'top left';
    wrap.style.height = wrapH + 'px';
  },

  switchCanvasTab(tab) {
    MCE.canvasTab = tab;
    document.querySelectorAll('.canvas-tab-btn').forEach(b => {
      const t = b.textContent.trim().toLowerCase();
      b.classList.toggle('active', t === tab || (tab === 'dom' && t === 'dom tree') || (tab === 'preview' && t === 'preview') || (tab === 'live' && t === 'live'));
    });
    document.getElementById('canvas-view').classList.toggle('active', tab === 'canvas');
    document.getElementById('dom-view').classList.toggle('active', tab === 'dom');
    document.getElementById('preview-view').classList.toggle('active', tab === 'preview');
    const liveEl = document.getElementById('live-view');
    if (liveEl) liveEl.style.display = tab === 'live' ? 'block' : 'none';
    if (tab === 'preview') this.runPreview();
    if (tab === 'live') requestAnimationFrame(() => this.renderLiveCanvas());
  },

  renderLiveCanvas() {
    const roots = MCE.rootOrder.filter(id => MCE.machines[id] && !MCE.machines[id].parentId);
    const frame = document.getElementById('live-canvas-frame');
    if (!frame) return;
    if (roots.length === 0) {
      frame.srcdoc = '<html><body style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0d0d1a;color:#666;font-family:sans-serif;font-size:13px">No machines yet</body></html>';
      this._applyLiveFrameZoom();
      return;
    }
    const bodyHTML = roots.map(id => MachineSystem.buildHTML(id, true)).join('\n');
    const css = this.buildExportCSS();
    const script = this.buildExportScript();
    // Click-to-select bridge (same-origin srcdoc can call window.parent)
    const selectBridge = `
(function(){
  document.addEventListener('click', function(e){
    var el = e.target;
    while(el && el.tagName !== 'BODY'){
      if(el.dataset && el.dataset.mceId){
        try{ window.parent.MachineSystem.select(el.dataset.mceId); }catch(x){}
        document.querySelectorAll('[data-mce-id]').forEach(function(x){ x.style.outline=''; });
        el.style.outline='2px solid #a78bfa';
        return;
      }
      el = el.parentElement;
    }
  }, true);
  // Highlight currently selected machine if any
  window.addEventListener('message', function(ev){
    if(ev.data && ev.data.type==='mce-select'){
      document.querySelectorAll('[data-mce-id]').forEach(function(x){ x.style.outline=''; });
      var t = document.querySelector('[data-mce-id="'+ev.data.id+'"]');
      if(t) t.style.outline='2px solid #a78bfa';
    }
    if(ev.data && ev.data.type==='mce:pipeData'){
      try{ if(typeof window._mce_applyBindings==='function') window._mce_applyBindings(ev.data.pipeName, ev.data.data, ev.data.bindings); }catch(x){}
    }
  });
})();`;
    frame.srcdoc = `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${css}*{box-sizing:border-box}body{margin:0}</style></head><body>${bodyHTML}<script>${selectBridge}${script}<\/script></body></html>`;
    this._applyLiveFrameZoom();
    // Auto-fetch all live GET pipes with bindings from the parent (auth-bearing) context
    const _dynBindings = {};
    Object.entries(MCE.machines).forEach(([_mid, _mm]) => {
      if (_mm.pipeBindings && _mm.pipeBindings.length) _dynBindings[_mid] = _mm.pipeBindings;
    });
    const _boundPipes = new Set();
    Object.values(MCE.machines).forEach(m => {
      (m.pipeBindings || []).forEach(pb => { if (pb.pipeName) _boundPipes.add(pb.pipeName); });
    });
    Object.values(MCE.loops || {}).forEach(loop => { if (loop.pipeName) _boundPipes.add(loop.pipeName); });
    _boundPipes.forEach(pipeName => {
      const pipe = MCE.pipes[pipeName];
      if (!pipe || pipe.method !== 'GET') return;
      setTimeout(() => {
        PipeSystem.fetch(pipeName).then(resp => {
          if (frame.contentWindow) {
            try { frame.contentWindow.postMessage({ type: 'mce:pipeData', pipeName, data: resp.data, bindings: _dynBindings }, '*'); } catch(e) {}
          }
        });
      }, 400);
    });
  },

  // ---- DB PANEL ----
  renderDB() {
    const el = document.getElementById('db-panel-content');
    if (!el) return;
    const ldb = LiveDBPanel;
    const active = ldb._activeCollection;
    const records = ldb._records;

    // ── Live DB ────────────────────────────────────────────────
    let html = `<div class="panel-section" style="padding-bottom:0">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <h4 style="margin:0;flex:1">&#128190; Live Database</h4>
        <button class="small" onclick="LiveDBPanel.loadCollections()" title="Refresh">${ldb._loading ? '…' : '&#8635;'}</button>
      </div>`;

    if (ldb._loading) {
      html += `<div style="color:var(--txt3);font-size:11px;padding:6px 0">Connecting…</div>`;
    } else if (ldb._collections === null) {
      html += `<button class="primary" style="width:100%;margin-bottom:4px" onclick="LiveDBPanel.loadCollections()">Connect to Your Database</button>
        <p style="color:var(--txt3);font-size:10px;margin-top:4px">Your collections are stored in MongoDB, scoped to your account.</p>`;
    } else {
      html += `<div style="display:flex;gap:4px;margin-bottom:8px">
        <input id="ldb-new-coll" placeholder="new_collection" style="flex:1;font-size:11px" onkeydown="if(event.key==='Enter')UI._liveDBCreate()">
        <button class="small primary" onclick="UI._liveDBCreate()">+ New</button>
      </div>`;
      if (!ldb._collections.length) {
        html += `<div class="empty-state">No collections yet — create one above</div>`;
      } else {
        ldb._collections.forEach(name => {
          const isActive = name === active;
          html += `<div class="list-item" style="${isActive ? 'border-color:var(--acc1);background:var(--bg3)' : ''}" onclick="LiveDBPanel.openCollection('${name}')">
            <span class="list-item-name" style="${isActive ? 'color:var(--acc1);font-weight:600' : ''}">${name}</span>
            <div class="list-item-actions">
              <button class="small" onclick="event.stopPropagation();UI._liveDBInsertModal('${name}')">+ Doc</button>
              <button class="small danger" onclick="event.stopPropagation();LiveDBPanel.dropCollection('${name}')">&#x2715;</button>
            </div>
          </div>`;
        });
      }
    }
    html += `</div>`;

    // ── Active collection records ──────────────────────────────
    if (active) {
      const userKeys = records.length
        ? [...new Set(records.flatMap(r => Object.keys(r).filter(k => !k.startsWith('_'))))]
        : [];
      html += `<div class="panel-section" style="border-top:1px solid var(--brd)">
        <div style="display:flex;align-items:center;gap:5px;margin-bottom:8px">
          <code style="flex:1;font-size:11px;color:var(--acc1);font-weight:600">${active}</code>
          <span class="badge">${records.length}</span>
          <button class="small" onclick="LiveDBPanel.openCollection('${active}')" title="Refresh">&#8635;</button>
          <button class="small primary" onclick="UI._liveDBInsertModal('${active}')">+ Doc</button>
        </div>`;
      if (!records.length) {
        html += `<div class="empty-state">Empty — click "+ Doc" to add a record</div>`;
      } else {
        records.forEach(r => {
          const id = String(r._id);
          const preview = userKeys.slice(0, 3).map(k => `<span style="color:var(--txt3);font-size:10px">${k}:</span> <span style="color:var(--txt1)">${String(r[k] ?? '').slice(0, 20)}</span>`).join('&nbsp;&nbsp;');
          html += `<div style="background:var(--bg1);border:1px solid var(--brd);border-radius:3px;padding:6px 8px;margin-bottom:5px">
            <div style="font-size:9px;color:var(--txt3);margin-bottom:2px;font-family:monospace">…${id.slice(-10)}</div>
            <div style="font-size:11px;margin-bottom:5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${preview || '(empty)'}</div>
            <div style="display:flex;gap:4px">
              <button class="small" style="flex:1;font-size:10px" onclick="UI._liveDBEditModal('${active}','${id}')">&#9998; Edit</button>
              <button class="small danger" style="font-size:10px" onclick="LiveDBPanel.deleteRecord('${active}','${id}')">&#x2715;</button>
            </div>
          </div>`;
        });
      }
      html += `</div>`;
    }

    // ── Preview DB (mock, collapsible) ─────────────────────────
    const stats = DB.getStats();
    const mockColls = DB.getCollections();
    const mockRows = mockColls.map(name => {
      const c = DB.getCollection(name);
      const count = c.isArray ? c.docs.length : (c.single?._id ? 1 : 0);
      return `<div class="list-item" onclick="UI._viewCollection('${name}')"><span class="list-item-name">${name}</span><span class="badge">${count}</span><div class="list-item-actions"><button class="small" onclick="event.stopPropagation();UI._insertModal('${name}')">+</button><button class="small danger" onclick="event.stopPropagation();DB.dropCollection('${name}')">&#x2715;</button></div></div>`;
    }).join('');
    html += `<div class="panel-section"><details><summary style="cursor:pointer;font-size:10px;color:var(--txt3);user-select:none;padding:2px 0">Preview DB (mock) <span class="badge">${stats.collections} colls / ${stats.documents} docs</span></summary>
      <div style="margin-top:8px">
        <div style="display:flex;gap:4px;margin-bottom:6px">
          <input id="db-coll-name" placeholder="collection_name" style="flex:1;font-size:11px">
          <select id="db-coll-type" style="font-size:11px"><option value="true">Array</option><option value="false">Single</option></select>
          <button class="small primary" onclick="UI._createCollection()">+</button>
        </div>
        ${mockColls.length === 0 ? '<div class="empty-state" style="font-size:10px">No mock collections</div>' : mockRows}
      </div>
    </details></div>
    <div id="db-collection-view"></div>`;

    el.innerHTML = html;
  },
  _createCollection() {
    const name = document.getElementById('db-coll-name').value.trim();
    const isArr = document.getElementById('db-coll-type').value === 'true';
    if (!name) return Logger.error('Collection name required');
    DB.createCollection(name, isArr);
    document.getElementById('db-coll-name').value = '';
  },
  _viewCollection(name) {
    const el = document.getElementById('db-collection-view');
    const c = DB.getCollection(name);
    if (!c || !el) return;
    const docs = c.isArray ? c.docs : (c.single ? [c.single] : []);
    if (!docs.length) { el.innerHTML = `<div class="panel-section"><h4>${name}</h4><div class="empty-state">Empty</div></div>`; return; }
    const keys = [...new Set(docs.flatMap(d => Object.keys(d)))];
    let html = `<div class="panel-section"><h4>${name} <button class="small danger" onclick="DB.clear('${name}')">Clear All</button></h4>
    <div style="overflow-x:auto"><table class="db-table"><tr>${keys.map(k => `<th>${k}</th>`).join('')}<th>Del</th></tr>
    ${docs.map(d => `<tr>${keys.map(k => `<td title="${String(d[k]||'')}">${String(d[k]||'')}</td>`).join('')}<td><button class="small danger" onclick="DB.remove('${name}',{_id:${d._id}})">&#x2715;</button></td></tr>`).join('')}
    </table></div></div>`;
    el.innerHTML = html;
  },
  _insertModal(collName) {
    const c = DB.getCollection(collName);
    if (!c) return;
    const pipes = Object.values(MCE.pipes).filter(p => p.collection === collName && p.direction === 'in');
    const schema = pipes.length ? pipes[0].schema : [];
    let fields = schema.length ? schema : [{key:'value',type:'text'}];
    const fieldsHTML = fields.map(f => `<div class="field"><label>${f.key} (${f.type})</label><input id="doc-field-${f.key}" placeholder="${f.key}"></div>`).join('');
    this.openModal(`
      <h3>Insert into "${collName}"</h3>
      <div id="doc-fields-custom"></div>
      ${fieldsHTML}
      <div class="field"><label>Custom JSON (overrides above)</label><textarea id="doc-json" rows="4" placeholder='{"key":"value"}'></textarea></div>
      <div class="modal-actions">
        <button onclick="UI.closeModal()">Cancel</button>
        <button class="primary" onclick="UI._doInsert('${collName}')">Insert</button>
      </div>`);
  },
  _doInsert(collName) {
    const jsonEl = document.getElementById('doc-json');
    let doc = {};
    if (jsonEl && jsonEl.value.trim()) {
      try { doc = JSON.parse(jsonEl.value); } catch(e) { Logger.error('Invalid JSON'); return; }
    } else {
      document.querySelectorAll('[id^="doc-field-"]').forEach(el => {
        const key = el.id.replace('doc-field-', '');
        doc[key] = el.value;
      });
    }
    DB.insert(collName, doc);
    this.closeModal();
  },

  _liveDBCreate() {
    const inp = document.getElementById('ldb-new-coll');
    const name = (inp?.value || '').trim().replace(/[^a-zA-Z0-9_-]/g, '_');
    if (!name) return Logger.error('Collection name required');
    LiveDBPanel.createCollection(name);
    if (inp) inp.value = '';
  },
  _liveDBInsertModal(collName) {
    this.openModal(`
      <h3 style="margin-bottom:12px;font-size:14px">Insert into <code style="color:var(--acc1)">${collName}</code></h3>
      <div class="field"><label>JSON Document</label>
        <textarea id="ldb-insert-json" rows="10" style="font-family:monospace;font-size:12px;width:100%;resize:vertical">{

}</textarea>
      </div>
      <div class="modal-actions">
        <button onclick="UI.closeModal()">Cancel</button>
        <button class="primary" onclick="UI._liveDBDoInsert('${collName}')">Insert</button>
      </div>`);
    setTimeout(() => {
      const t = document.getElementById('ldb-insert-json');
      if (t) { t.selectionStart = t.selectionEnd = t.value.indexOf('\n  \n') + 3; t.focus(); }
    }, 40);
  },
  _liveDBDoInsert(collName) {
    const jsonEl = document.getElementById('ldb-insert-json');
    let doc;
    try { doc = JSON.parse(jsonEl?.value || '{}'); } catch(e) { Logger.error('Invalid JSON: ' + e.message); return; }
    LiveDBPanel.insertRecord(collName, doc);
    this.closeModal();
  },
  _liveDBEditModal(collName, id) {
    const record = LiveDBPanel._records.find(r => String(r._id) === String(id));
    if (!record) return;
    const editable = Object.fromEntries(Object.entries(record).filter(([k]) => !k.startsWith('_')));
    this.openModal(`
      <h3 style="margin-bottom:4px;font-size:14px">Edit — <code style="color:var(--acc1)">${collName}</code></h3>
      <p style="color:var(--txt3);font-size:10px;margin-bottom:12px;font-family:monospace">_id: ${id}</p>
      <div class="field"><label>JSON Document</label>
        <textarea id="ldb-edit-json" rows="12" style="font-family:monospace;font-size:12px;width:100%;resize:vertical">${JSON.stringify(editable, null, 2)}</textarea>
      </div>
      <div class="modal-actions">
        <button onclick="UI.closeModal()">Cancel</button>
        <button class="primary" onclick="UI._liveDBDoEdit('${collName}','${id}')">Save Changes</button>
      </div>`);
    setTimeout(() => { const t = document.getElementById('ldb-edit-json'); if (t) t.focus(); }, 40);
  },
  _liveDBDoEdit(collName, id) {
    const jsonEl = document.getElementById('ldb-edit-json');
    let doc;
    try { doc = JSON.parse(jsonEl?.value || '{}'); } catch(e) { Logger.error('Invalid JSON: ' + e.message); return; }
    LiveDBPanel.updateRecord(collName, id, doc);
    this.closeModal();
  },

  // ---- FILES PANEL ----
  renderFiles() {
    const el = document.getElementById('files-panel-content');
    if (!el) return;
    const fp = FilesPanel;
    const iconFor = type => type === 'image' ? '🖼' : type === 'video' ? '🎬' : type === 'audio' ? '🎵' : '📄';
    const fmtSize = b => b > 1048576 ? (b/1048576).toFixed(1)+'MB' : b > 1024 ? (b/1024).toFixed(0)+'KB' : b+'B';

    if (fp._loading) { el.innerHTML = `<div style="color:var(--txt3);font-size:11px;padding:12px">Loading…</div>`; return; }
    if (fp._files === null) {
      el.innerHTML = `<div class="panel-section"><p style="color:var(--txt3);font-size:11px">Sign in to use file storage.</p></div>`;
      return;
    }

    const filters = ['all','image','video','audio'];
    const visible = fp._files.filter(f => fp._filter === 'all' || f.type === fp._filter);

    let html = `<div class="panel-section">
      <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
        <h4 style="margin:0;flex:1">&#128193; File Storage</h4>
        <button class="small" onclick="FilesPanel.load()" title="Refresh">&#8635;</button>

        onclick="document.getElementById('files-upload-input').click()"
        ondragover="event.preventDefault();this.style.borderColor='var(--acc1)'"
        ondragleave="this.style.borderColor='var(--brd)'"
        ondrop="event.preventDefault();this.style.borderColor='var(--brd)';FilesPanel.upload(event.dataTransfer.files)">
        <div style="font-size:20px;margin-bottom:4px">&#8679;</div>
        <div style="color:var(--txt3);font-size:11px">Drop files or click to upload</div>
        <div style="color:var(--txt3);font-size:10px;margin-top:2px">Images · Videos · Audio · Up to 200MB each</div>
      </div>
      <input id="files-upload-input" type="file" multiple accept="image/*,video/*,audio/*" style="display:none"
        onchange="FilesPanel.upload(this.files);this.value=''">
      <div style="display:flex;gap:4px;margin-bottom:8px">
        ${filters.map(f => `<button class="small${fp._filter===f?' primary':''}" style="flex:1" onclick="FilesPanel._filter='${f}';UI.renderFiles()">${f}</button>`).join('')}
      </div>
    </div>`;

    if (!fp._files.length) {
      html += `<div style="color:var(--txt3);font-size:11px;padding:8px 0;text-align:center">No files yet — upload something above</div>`;
    } else if (!visible.length) {

      ${pipes.map(p => `
        <div class="list-item" style="flex-direction:column;align-items:flex-start;gap:4px;padding:8px">
          <div style="display:flex;width:100%;align-items:center;gap:6px">
            <span class="tag-method tag-${(p.method||'post').toLowerCase()}">${p.method||'POST'}</span>
            ${p.live ? '<span style="font-size:9px;padding:1px 5px;border-radius:2px;background:#16a34a;color:#fff;font-weight:700">LIVE</span>' : ''}
            <code style="font-size:10px;color:var(--txt2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.endpoint||'/api/'+p.collection}</code>
            <div class="list-item-actions">
              <button class="small" onclick="UI._editPipeTemplate('${p.name}')">Template</button>
              <button class="small" onclick="UI._testPipe('${p.name}')">Test</button>
              <button class="small danger" onclick="PipeSystem.delete('${p.name}')">&#x2715;</button>
            </div>
          </div>
          <div style="font-size:10px;color:var(--txt3)">${p.name} · ${p.collection ? (p.live ? '&#128190; ' + p.collection : '&#127381; ' + p.collection) : 'no collection'} · ${p.delay||0}ms</div>
        </div>`).join('')}
    </div>
    <div class="panel-section">
      <h4>Mock API Routes <span class="badge">${endpoints.length}</span></h4>
      <p style="color:var(--txt3);font-size:10px;margin-bottom:6px">All registered mock endpoints. Pipe calls route through here to the DB.</p>
      ${endpoints.length === 0 ? '<div class="empty-state">No routes yet — create a pipe to register routes</div>' : ''}
      ${endpoints.map(ep => `
        <div class="api-route">
          <span class="tag-method tag-${ep.method.toLowerCase()}">${ep.method}</span>

  },
  _addSchemaRow() {
    const rows = document.getElementById('pipe-schema-rows');
    if (!rows) return;
    const sel = document.getElementById('pipe-coll');
    const opt = sel?.options[sel?.selectedIndex];
    const coll = sel?.value;
    const isLive = opt?.dataset?.live === '1';
    let fields = [];
    if (coll) {
      if (isLive) fields = (LiveDBPanel._fieldCache[coll] || []).filter(f => !f.startsWith('_'));
      else {
        const c = DB._store[coll];
        const docs = c?.isArray ? c.docs : (c?.single ? [c.single] : []);
        if (docs.length) fields = Object.keys(docs[0]).filter(f => !f.startsWith('_'));
      }
    }
    const keyEl = fields.length
      ? `<select class="schema-key" style="flex:1">${fields.map(f => `<option value="${f}">${f}</option>`).join('')}</select>`
      : `<input placeholder="field name" class="schema-key" style="flex:1">`;
    const row = document.createElement('div');
    row.className = 'pipe-schema-row';
    row.style.cssText = 'display:flex;gap:4px;margin-bottom:4px';
    row.innerHTML = `${keyEl}<select class="schema-type"><option>text</option><option>number</option><option>boolean</option><option>date</option></select><button class="small danger" onclick="this.parentElement.remove()">&#x2715;</button>`;
    rows.appendChild(row);
  },
  _updatePipeEndpointHint() {
    const coll = document.getElementById('pipe-coll')?.value;
    const live = document.getElementById('pipe-live')?.checked;
    const ep = document.getElementById('pipe-endpoint');
    if (ep && coll && (!ep.value || ep.value.startsWith('/api/'))) {
      ep.value = live ? `/api/db/${coll}` : `/api/${coll}`;
    }
  },
  _onPipeCollChange() {
    const sel = document.getElementById('pipe-coll');
    const opt = sel?.options[sel.selectedIndex];
    const isLiveColl = opt?.dataset?.live === '1';
    const liveCheck = document.getElementById('pipe-live');
    if (liveCheck && isLiveColl) liveCheck.checked = true;
    if (liveCheck && !isLiveColl && sel?.value) liveCheck.checked = false;
    this._updatePipeEndpointHint();
    const coll = sel?.value;
    if (!coll) return;
    const rows = document.getElementById('pipe-schema-rows');
    if (!rows) return;
    const populate = fields => {
      const filtered = fields.filter(f => !f.startsWith('_'));
      rows.innerHTML = '';
      filtered.forEach(key => {
        const row = document.createElement('div');
        row.className = 'pipe-schema-row';
        row.style.cssText = 'display:flex;gap:4px;margin-bottom:4px';
        const opts = filtered.map(f => `<option value="${f}"${f===key?' selected':''}>${f}</option>`).join('');
        row.innerHTML = `<select class="schema-key" style="flex:1">${opts}</select><select class="schema-type"><option>text</option><option>number</option><option>boolean</option><option>date</option></select><button class="small danger" onclick="this.parentElement.remove()">&#x2715;</button>`;
        rows.appendChild(row);
      });
    };
    if (isLiveColl) {
      const cached = LiveDBPanel._fieldCache[coll];
      if (cached && cached.length) { populate(cached); }
      else { LiveDBPanel.fetchFields(coll).then(fields => { if (fields.length) populate(fields); }); }
    } else {
      const c = DB._store[coll];
      if (c) {
        const docs = c.isArray ? c.docs : (c.single ? [c.single] : []);
        if (docs.length) populate(Object.keys(docs[0]));
      }
    }
  },
  _createPipe() {
    const name = document.getElementById('pipe-name').value.trim();
    const method = document.getElementById('pipe-method').value;
    const coll = document.getElementById('pipe-coll').value;
    const live = !!(document.getElementById('pipe-live')?.checked);
    const endpoint = document.getElementById('pipe-endpoint').value.trim() || (live ? `/api/db/${coll || name}` : `/api/${coll || name}`);
    const delay = parseInt(document.getElementById('pipe-delay').value) || 300;
    const queryTemplate = (document.getElementById('pipe-query-template')?.value || '').trim();
    const desc = document.getElementById('pipe-desc').value.trim();
    if (!name) return Logger.error('Pipe name required');
    const schema = [];
    document.querySelectorAll('.pipe-schema-row').forEach(row => {
      const key = row.querySelector('.schema-key').value.trim();
      const type = row.querySelector('.schema-type').value;
      if (key) schema.push({ key, type });
    });
    PipeSystem.create(name, { method, endpoint, collection: coll, delay, schema, description: desc, live, queryTemplate });
    document.getElementById('pipe-name').value = '';
    document.getElementById('pipe-desc').value = '';
    document.getElementById('pipe-endpoint').value = '';
    document.getElementById('pipe-schema-rows').innerHTML = '';
  },
  _testPipe(name) {
    const p = MCE.pipes[name];
    if (!p) return;
    const isRead = p.method === 'GET';
    const schema = p.schema || [];
    let bodyHTML = '';
    if (!isRead) {
      if (schema.length) {
        bodyHTML = schema.map(s => {
          const inputType = s.type === 'number' ? 'number' : s.type === 'date' ? 'date' : 'text';
          return `<div class="field" style="margin-bottom:8px">
            <label style="display:flex;align-items:center;gap:6px">${s.key} <span style="color:var(--txt3);font-size:10px">${s.type||'text'}</span></label>
            <input id="tpf-${s.key}" type="${inputType}" placeholder="${s.key}" style="width:100%">
          </div>`;
        }).join('');
      } else {
        bodyHTML = `<div class="field"><label>Request Body (JSON)</label>
          <textarea id="test-pipe-data" rows="6" style="font-family:monospace;font-size:11px;width:100%">{}</textarea>
        </div>`;
      }
    }
    this.openModal(`
      <h3 style="margin-bottom:4px;font-size:14px">${p.method} ${p.endpoint}</h3>
      <p style="color:var(--txt3);font-size:11px;margin-bottom:12px">${p.name} · ${p.collection||'no collection'} · ${p.delay||0}ms delay</p>
      ${!isRead ? bodyHTML : '<p style="color:var(--txt3);font-size:11px;margin-bottom:12px">GET request — no body required.</p>'}
      <div class="modal-actions" style="display:flex;gap:8px">
        <button onclick="UI.closeModal()">Cancel</button>
        <button class="primary" onclick="UI._execTestPipe('${name}')">&#9654; Send</button>
      </div>
      <div id="test-pipe-result" style="margin-top:12px"></div>`);
  },
  _execTestPipe(name) {
    const p = MCE.pipes[name];
    if (!p) return;
    const resultEl = document.getElementById('test-pipe-result');
    if (resultEl) resultEl.innerHTML = `<span style="color:var(--txt3);font-size:11px">Sending ${p.method} ${p.endpoint}…</span>`;
    let promise;
    if (p.method === 'GET') {
      promise = PipeSystem.fetch(name);
    } else {
      let body = {};
      const schema = p.schema || [];
      if (schema.length) {
        schema.forEach(s => {
          const el = document.getElementById('tpf-' + s.key);
          if (!el) return;
          const v = el.value;
          if (s.type === 'number') body[s.key] = v === '' ? '' : (isNaN(Number(v)) ? v : Number(v));
          else if (s.type === 'boolean') body[s.key] = v === 'true' || v === '1' || v === 'yes';
          else body[s.key] = v;
        });
      } else {
        try { body = JSON.parse(document.getElementById('test-pipe-data')?.value || '{}'); } catch(e) { Logger.error('Invalid JSON: ' + e.message); return; }
      }
      promise = PipeSystem.execute(name, body);
    }
    if (promise && promise.then) {
      promise.then(response => {
        if (resultEl) resultEl.innerHTML = `<label>Response</label><textarea rows="8" readonly style="width:100%;font-size:10px;font-family:monospace;background:var(--bg3);color:var(--txt1);border:1px solid var(--brd);padding:6px;border-radius:3px">${JSON.stringify(response, null, 2)}</textarea>`;
      });
    }
  },

  _editPipeTemplate(name) {
    const p = MCE.pipes[name];
    if (!p) return;
    const isWrite = ['POST','PUT','DELETE'].includes(p.method || 'GET');
    const allMachines = MachineSystem.flatOrder().map(mid => MCE.machines[mid]).filter(Boolean);
    const allVars = Object.keys(MCE.vars);
    const bt = p.bodyTemplate || {};
    const btRows = Object.entries(bt).map(([k, v], i) =>
      `<div style="display:flex;gap:4px;margin-bottom:4px;align-items:center">
        <input placeholder="field" style="flex:1;min-width:0" value="${k.replace(/"/g,'&quot;')}" oninput="window._ptmpEdit('key',${i},this.value)">
        <span style="color:var(--txt3);font-size:12px">→</span>
        <input placeholder="value or {{machine:id}}" style="flex:2;min-width:0;font-family:monospace;font-size:11px" id="pt-body-val-${i}" value="${v.replace(/"/g,'&quot;')}" oninput="window._ptmpEdit('val',${i},this.value)">
        <button class="small danger" onclick="window._ptmpRemove(${i})">&#x2715;</button>
      </div>`).join('');
    const machineOpts = allMachines.map(m => `<option value="{{machine:${m.id}}}">${m.name} &lt;${m.tag}&gt;</option>`).join('');
    const varOpts = allVars.map(k => `<option value="{{var:${k}}}">${'{{'+ k +'}}'}</option>`).join('');
    const payloadOpts = `<option value="{{payload:value}}">payload.value</option><option value="{{payload:key}}">payload.key</option>`;
    window._ptmpState = { name, bt: JSON.parse(JSON.stringify(bt)) };
    window._ptmpEdit = (type, idx, val) => {
      const keys = Object.keys(window._ptmpState.bt);
      const vals = Object.values(window._ptmpState.bt);
      if (type === 'key') { const oldKey = keys[idx]; const v = window._ptmpState.bt[oldKey]; delete window._ptmpState.bt[oldKey]; const newBt = {}; Object.entries(window._ptmpState.bt).forEach(([k2, v2], i2) => { newBt[i2 < idx ? k2 : k2] = v2; }); window._ptmpState.bt = Object.fromEntries(Object.entries(window._ptmpState.bt).map(([k2,v2],i2) => i2 === idx ? [val, v2] : [k2, v2])); }
      else { const key = keys[idx]; if (key !== undefined) window._ptmpState.bt[key] = val; }
    };
    window._ptmpRemove = (idx) => { const keys = Object.keys(window._ptmpState.bt); delete window._ptmpState.bt[keys[idx]]; UI._editPipeTemplate(name); };
    window._ptmpAdd = () => { window._ptmpState.bt['newField'] = ''; UI._editPipeTemplate(name); };
    const insertToken = (fieldId, tok) => {
      const el = document.getElementById(fieldId); if (!el) return;
      const s = el.selectionStart ?? el.value.length;
      el.value = el.value.slice(0, s) + tok + el.value.slice(el.selectionEnd ?? s);
      el.dispatchEvent(new Event('input'));
      el.focus();
    };
    window._ptmpInsertURL = tok => insertToken('pt-url', tok);
    this.openModal(`
      <h3 style="font-size:14px;margin-bottom:4px">Request Template — ${p.name}</h3>
      <p style="color:var(--txt3);font-size:11px;margin-bottom:12px">${p.method} · ${p.endpoint}</p>
      <div style="margin-bottom:10px">
        <label style="font-size:11px;color:var(--txt2);display:block;margin-bottom:4px">URL Template <span style="color:var(--txt3)">(overrides endpoint at runtime)</span></label>
        <div style="display:flex;gap:4px;margin-bottom:4px">
          <input id="pt-url" style="flex:1;font-family:monospace;font-size:11px" value="${(p.urlTemplate||'').replace(/"/g,'&quot;')}" placeholder="${p.endpoint || '/api/'+p.collection}">
        </div>
        <div style="display:flex;gap:4px;flex-wrap:wrap">
          <select style="font-size:11px" onchange="if(this.value)window._ptmpInsertURL(this.value);this.value=''">
            <option value="">+ machine token</option>${machineOpts}
          </select>
          <select style="font-size:11px" onchange="if(this.value)window._ptmpInsertURL(this.value);this.value=''">
            <option value="">+ var token</option>${varOpts}
          </select>
          <select style="font-size:11px" onchange="if(this.value)window._ptmpInsertURL(this.value);this.value=''">
            <option value="">+ payload token</option>${payloadOpts}
          </select>
        </div>
      </div>
      ${isWrite ? `<div style="margin-bottom:10px">
        <label style="font-size:11px;color:var(--txt2);display:block;margin-bottom:6px">Body Template <span style="color:var(--txt3)">(field → value/token mapping for ${p.method})</span></label>
        <div id="pt-body-rows">${btRows}</div>
        <button class="small" onclick="window._ptmpAdd()">+ Field</button>
        <p style="color:var(--txt3);font-size:10px;margin-top:6px">Use machine/var pickers above, or type <code>{{machine:id}}</code> / <code>{{var:name}}</code> / <code>{{payload:value}}</code> in any value cell.</p>
      </div>` : ''}
      <p style="color:var(--txt3);font-size:10px;background:var(--bg3);padding:6px;border-radius:3px;margin-bottom:10px">Tokens: <code>{{key}}</code> (view param or event payload) · <code>{{machine:id}}</code> · <code>{{var:name}}</code> · <code>{{payload:key}}</code><br>Use <code>{{_id}}</code> to build single-doc URLs like <code>/api/db/photos/{{_id}}</code>. Trigger with <b>pipeOut</b> on a view event.</p>
      <div class="modal-actions" style="display:flex;gap:8px">
        <button onclick="UI.closeModal()">Cancel</button>
        <button onclick="MCE.pipes['${name}'].urlTemplate='';UI.closeModal();UI.renderPipes();Logger.info('URL template cleared')">Clear URL Tpl</button>
        <button class="primary" onclick="UI._savePipeTemplate('${name}')">Save Template</button>
      </div>`);
  },
  _savePipeTemplate(name) {
    const p = MCE.pipes[name];
    if (!p) return;
    const urlEl = document.getElementById('pt-url');
    if (urlEl) p.urlTemplate = urlEl.value.trim();
    p.bodyTemplate = window._ptmpState ? Object.assign({}, window._ptmpState.bt) : {};
    this.closeModal();
    UI.renderPipes();
    Logger.ok(`[template] Pipe "${name}" template saved — URL: ${p.urlTemplate || '(none)'} Body fields: ${Object.keys(p.bodyTemplate).join(', ') || '(none)'}`);
  },

              <button class="small" onclick="UI._testLoop('${l.name}')">Run</button>

              <button class="small danger" onclick="LoopSystem.delete('${l.name}')">&#x2715;</button>
            </div>
          </div>
          <div style="font-size:10px;color:var(--txt3)">${l.pipeName || 'no pipe'} → ${targetName}</div>
          ${l.description ? `<div style="font-size:10px;color:var(--txt3);font-style:italic">${l.description}</div>` : ''}

  _createLoop() {
    const name = document.getElementById('loop-name').value.trim();
    const pipeName = document.getElementById('loop-pipe').value;
    const targetId = document.getElementById('loop-target').value || null;
    const dataField = document.getElementById('loop-datafield').value.trim();
    const clickEvent = document.getElementById('loop-clickevent').value.trim();
    const clickView = document.getElementById('loop-clickview').value.trim();
    const clickValueField = document.getElementById('loop-clickvaluefield').value.trim();
    const template = document.getElementById('loop-template').value;
    const desc = document.getElementById('loop-desc').value.trim();
    const pageSize = parseInt(document.getElementById('loop-pagesize').value, 10) || 0;
    const paginationId = document.getElementById('loop-paginationid').value || '';
    if (!name) return Logger.error('Loop name required');
    if (!pipeName) return Logger.error('Loop source pipe required');
    LoopSystem.create(name, { pipeName, targetId, template, dataField, clickEvent, clickView, clickValueField, description: desc, pageSize, paginationId });
    document.getElementById('loop-name').value = '';
    document.getElementById('loop-datafield').value = '';
    document.getElementById('loop-clickevent').value = '';
    document.getElementById('loop-clickview').value = '';
    document.getElementById('loop-clickvaluefield').value = '';
    document.getElementById('loop-template').value = '';
    document.getElementById('loop-desc').value = '';
    document.getElementById('loop-pagesize').value = '';
    document.getElementById('loop-paginationid').value = '';
  },
  _loopFieldsForPipe(pipeName) {
    const fields = new Set(['_index', '_total']);
    const pipe = MCE.pipes[pipeName];
    if (pipe && Array.isArray(pipe.schema)) pipe.schema.forEach(s => { if (s.key) fields.add(s.key); });
    if (pipe && pipe.collection && DB._store[pipe.collection]) {
      const c = DB._store[pipe.collection];
      const docs = c.isArray ? c.docs : (c.single ? [c.single] : []);
      docs.slice(0, 5).forEach(doc => Object.keys(doc || {}).forEach(k => {
        if (!k.startsWith('_')) fields.add(k);
      }));
    }
    return [...fields];
  },
  _loopToken(field, filter, arg) {
    if (!field) return '';
    let token = '{{' + field;
    if (filter) token += '|' + filter + (arg ? ':' + arg : '');
    return token + '}}';
  },
  _refreshLoopBuilder(prefix) {
    const pipeEl = document.getElementById(prefix === 'edit-loop' ? 'edit-loop-pipe' : 'loop-pipe');
    const fieldEl = document.getElementById(prefix + '-token-field');
    const chipsEl = document.getElementById(prefix + '-field-chips');
    const pipeName = pipeEl ? pipeEl.value : '';
    const fields = this._loopFieldsForPipe(pipeName);
    if (fieldEl) {
      fieldEl.innerHTML = fields.map(f => `<option value="${f}">${f}</option>`).join('');
    }
    if (chipsEl) {
      chipsEl.innerHTML = fields.map(f => `<button class="small" onclick="UI._insertLoopToken('${prefix}','${f}')">{{${f}}}</button>`).join('');
    }
  },
  _insertAtCursor(textarea, text) {
    if (!textarea) return;
    const start = textarea.selectionStart ?? textarea.value.length;
    const end = textarea.selectionEnd ?? textarea.value.length;
    textarea.value = textarea.value.slice(0, start) + text + textarea.value.slice(end);
    textarea.focus();
    textarea.selectionStart = textarea.selectionEnd = start + text.length;
  },
  _insertLoopToken(prefix, forcedField = '') {
    const tpl = document.getElementById(prefix === 'edit-loop' ? 'edit-loop-template' : 'loop-template');
    const field = forcedField || document.getElementById(prefix + '-token-field')?.value || '';
    const filter = document.getElementById(prefix + '-token-filter')?.value || '';
    const arg = document.getElementById(prefix + '-token-arg')?.value || '';
    this._insertAtCursor(tpl, this._loopToken(field, filter, arg));
  },
  _applyLoopPreset(prefix) {
    const tpl = document.getElementById(prefix === 'edit-loop' ? 'edit-loop-template' : 'loop-template');
    const preset = document.getElementById(prefix + '-preset')?.value || 'list';
    const pipeName = document.getElementById(prefix === 'edit-loop' ? 'edit-loop-pipe' : 'loop-pipe')?.value || '';
    const fields = this._loopFieldsForPipe(pipeName).filter(f => f !== '_index' && f !== '_total');
    const a = fields[0] || 'name';
    const b = fields[1] || 'message';
    const c = fields[2] || 'status';
    const val = f => this._loopToken(f);
    const templates = {
      list: `<div style="display:flex;align-items:center;gap:12px;padding:12px 14px;border-bottom:1px solid #222"><span style="font-size:11px;color:#777;width:24px">{{_index}}</span><strong style="flex:1">${val(a)}</strong><span style="font-size:12px;color:#888">${val(b)}</span></div>`,
      card: `<article style="border:1px solid #222;border-radius:6px;padding:18px;margin-bottom:12px;background:#111"><p style="font-size:11px;color:#777;margin:0 0 8px 0">#{{_index}} of {{_total}}</p><h3 style="margin:0 0 8px 0">${val(a)}</h3><p style="margin:0;color:#aaa;line-height:1.6">${val(b)}</p></article>`,
      compact: `<p style="margin:0 0 8px 0"><strong>{{_index}}.</strong> ${val(a)} <span style="color:#888">${val(b)}</span></p>`,
      'table-row': `<tr><td>{{_index}}</td><td>${val(a)}</td><td>${val(b)}</td><td>${val(c)}</td></tr>`
    };
    if (tpl) tpl.value = templates[preset] || templates.list;
  },
  _testLoop(name) {
    const loop = MCE.loops[name];
    if (!loop) return;
    if (!loop.pipeName) return Logger.error(`Loop "${name}" has no source pipe`);
    const pipe = MCE.pipes[loop.pipeName];
    if (!pipe) return Logger.error(`Pipe "${loop.pipeName}" not found`);
    PipeSystem.fetch(loop.pipeName).then(response => {
      if (response && response.status === 200) {
        const count = Array.isArray(response.data) ? response.data.length : (response.data ? 1 : 0);
        Logger.ok(`Loop "${name}" ran: ${count} document${count !== 1 ? 's' : ''} rendered`);
      }
    });
  },
  _editLoop(name) {
    const loop = MCE.loops[name];

    const getPipes = Object.values(MCE.pipes).filter(p => p.method === 'GET');
    const allMachines = Object.values(MCE.machines);

      </div>
      <div class="field"><label>Array Field <small style="color:var(--txt3)">(optional — field name if pipe returns one doc with an array of items)</small></label><input id="edit-loop-datafield" placeholder="e.g. photos" value="${loop.dataField || ''}"></div>

      <div class="field"><label>Pagination Controls Machine <small style="color:var(--txt3)">(optional — machine to render page buttons into)</small></label>
        <select id="edit-loop-paginationid">
          <option value="">— append inside target —</option>
          ${allMachines.map(m => `<option value="${m.id}" ${m.id === loop.paginationId ? 'selected' : ''}>${m.name} &lt;${m.tag}&gt;</option>`).join('')}
        </select>
      </div>
      <div class="field">
        <label>Template Builder</label>
        <div style="border:1px solid var(--brd);border-radius:3px;padding:8px;background:var(--bg2)">
          <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
            <select id="edit-loop-preset" style="flex:1;min-width:110px">

              <option value="card">Card</option>
              <option value="compact">Compact Line</option>
              <option value="table-row">Table Row</option>
            </select>
            <button class="small" onclick="UI._applyLoopPreset('edit-loop')">Apply Preset</button>
          </div>
          <div style="display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap">
            <select id="edit-loop-token-field" style="flex:1;min-width:110px"></select>

              <option value="">No filter</option>
              ${FILTER_NAMES.map(f => `<option>${f}</option>`).join('')}
            </select>
            <input id="edit-loop-token-arg" placeholder="filter arg" style="width:90px">

      <div class="field"><label>Template HTML</label>

      </div>
      ${Object.keys(MCE.templates || {}).length > 0 ? `

        <div style="display:flex;gap:6px">
          <select id="edit-loop-from-tpl" style="flex:1"><option value="">— select template —</option>${Object.keys(MCE.templates || {}).map(n => `<option value="${n}">${n}</option>`).join('')}</select>
          <button class="small" onclick="UI._loadTemplateToLoop('edit-loop')">Load</button>
        </div>
      </div>` : ''}
      <div class="modal-actions" style="display:flex;gap:8px;margin-top:12px">
        <button onclick="UI.closeModal()">Cancel</button>

      </div>`);
    this._refreshLoopBuilder('edit-loop');
  },
  _saveEditLoop(name) {
    const loop = MCE.loops[name];
    if (!loop) return;
    loop.pipeName = document.getElementById('edit-loop-pipe').value;
    loop.targetId = document.getElementById('edit-loop-target').value || null;
    loop.dataField = document.getElementById('edit-loop-datafield').value.trim();
    loop.clickEvent = document.getElementById('edit-loop-clickevent').value.trim();
    loop.clickView = document.getElementById('edit-loop-clickview').value.trim();
    loop.clickValueField = document.getElementById('edit-loop-clickvaluefield').value.trim();
    loop.template = document.getElementById('edit-loop-template').value;
    loop.pageSize = parseInt(document.getElementById('edit-loop-pagesize').value, 10) || 0;

  _addLoopBinding(machineId) {
    const m = MCE.machines[machineId];
    if (!m) return;
    let base = m.name + 'Loop', name = base, n = 2;
    while (MCE.allNames().has(name)) name = base + n++;
    LoopSystem.create(name, { pipeName: '', targetId: machineId, template: '', dataField: '', clickEvent: '', clickView: '', clickValueField: '', pageSize: 0, paginationId: '' });
    UI.renderInspector();
  },
